body:
  text: 千里醫案卷三咳嗽嘉興陳初起寒熱頭痛咳嗽汗泄明屬風傷肺衛為病奈氣體素虛向有肝鬱今肺既不宣肝必易逆挾飲阻絡上干清陽以致咳逆痰薄左脅引痛舌苔厚白乾而不渴胸脘痞悶不飢少食溺黃而少便乾而堅此飲阻絡痹氣亦膹郁也呃逆頻出咽左激痛甚或氣衝至巔耳鳴頭量此肝陽化風鬱而為熱也總而言之始則外風引動內飲繼則外風引動內風迄今八九日外風將化而痰飲肝風反擾攘不解脈右寸及左三部皆近數急須清金以制木通陽以和飲西洋參一錢五分九孔石決明三錢陳皮一錢五分海石粉二錢川貝母三錢茯苓二錢白蒺藜二錢竹茹七分杏仁二錢旋覆花一錢五分蛤殼四錢霜桑葉兩片石門吳煩勞陽虛之體加以嗜酒積濕濕濁釀痰故素有善咳腳氣等症今因新寒外襲宿飲內動初起惡寒鼻塞清涕喘咳不得臥痰雖來而氣仍逆上痰氣壅於中濕熱腳氣動於下加之陽素虛而血又動安內攘外何恃毋恐姑擬定喘化痰順氣和絡法潞黨參二錢驢皮膠一錢五分分二次入冬瓜子三錢川貝母二錢蘆根五錢橘皮一錢五分旋覆花包一錢五分炙甘草四分絲瓜絡三錢雲苓二錢海石粉二錢薏苡仁三錢杏仁二錢又諸恙皆退胃納已增脈象靜小舌色潤澤惟寐後乾咳得湯飲即痰出而嗽已臥時又須倚枕足見風燥之火易劫津氣甘涼濡潤以滋氣存津自是此症要旨擬以前法中再參濡肺胃法潞黨參二錢驢皮膠二錢麥門冬一錢五分炙甘草四分橘皮一錢五分川貝母二錢鮮生地三錢榧子肉冰糖拌炒七粒茯苓二錢杏仁二錢金石斛二錢南潯錢血後之咳治之本難不過蓄血與虛損之血稍有間耳今進和補陽明法神氣漸旺或可漸圖恢復然治咳正須時日斷難欲速也潞黨參一錢川貝母二錢茯苓二錢澤瀉一錢五分大熟地三錢黃蔑一錢五分橘皮一錢五分驢皮膠二錢甜杏仁三錢炙草四分平望許初則晨刻咳嘔飲濁久則哮嗽上氣夜不著枕行艱報息頭汗舌膩脈虛凝如毛右部間露弦象既經多年除根不易議和飲通陽平逆定喘法先為禦寒之計潞黨參二錢陳皮一錢五分蘇子一錢五分五味子乾薑一分同搗十粒生冬朮一錢五分炙草四分海石粉二錢蜜炙麻黃三分雲茯苓三錢杏仁二錢白果三枚生薑搗竹茹七分江寧席易感善咳咳逆痰清此肺氣損而衛外之陽弱也既經多年肺陰已虛以致近年來音氣易澀矣脈虛濡右手兼有小弦之象宜滋肺氣養肺陰時時調理毋使失血失音之流弊西洋參一錢五分廣橘紅一錢五分紫苑一錢五分白蜜三分杏仁二錢驢皮膠二錢牛蒡子一錢五分糯米百粒川貝母二錢炙甘草四分馬兜鈴一錢五分枇杷葉兩片塘樓毛肺虛失降肝鬱易升胃弱飲聚飲踞於中則外寒一引即動是以咳逆至冬為甚也消渴為肺熱今脈左偏弦舌苔黃厚調郁清肝可望肺胃之陽和而熱可平飲可滌矣潞黨參二錢法半夏一錢五分旋覆花包一錢五分沉香三分陳皮一錢五分小川連三分代赭石二錢白蒺藜二錢雲茯苓二錢蛤殼二錢蘇子一錢五分新市鄭咳復作痰少不厚時有肝氣左升腹痛得嘔泄始平脈體本弦長今弦兼滑長兼洪左尤甚飲咳本宜甘溫以和之所謂飲家咳不治咳也今既肺降不及肝升有餘甚至痰滯凝血宜從濕痰挾火之例矣法半夏一錢五分旋覆花包一錢五分蛤殼三錢竹茹七分陳皮一錢五分代赭石二錢小川連三分桑葉兩張茯苓二錢海石粉二錢炙草五分又咳勢較緩痰之厚者仍少脈弦左仍帶滑不過洪滑較減耳舌苔白里半猶黃膩飲咳既久挾濕又兼肝氣當先為清肝化濕以衰其助況時屆濕土亦因時制宜之法法半夏一錢五分陳皮一錢五分蛤殼三錢海石紛二錢生冬朮一錢五分茯苓二錢丹皮一錢五分小川連三分白蒺藜二錢茵陳草一錢五分桑葉兩片竹茹一錢又咳逆夜甚晨則痰飲較多近加喉糜音欠爽亮脈右較平左仍弦滑寸部尢甚痰飲既未和肺氣失清又挾時令之熱而為喉糜人迎脈盛必有外感非必心陽上亢也宜參金水化痰法元參一錢五分馬兜鈴一錢五分甘草四分桑葉一錢五分紫苑一錢五分牛蒡子二錢天竺黃二錢竹茹七分杏仁二錢川貝母去心二錢丹皮一錢五分石門陳去夏之陡然吐血當是濕熱蒸傷陽絡絡空則濕熱乘虛而入留釀為飲飲咳至今雖有盛衰究未停息飲之所聚雖由血去絡空而飲之所生實由陽虛濕勝故夏秋胃納雖和而體乏無力右腿時痛也比因新寒引動宿飲身熱汗多咳而兼嘔周身絡痛而左脅為甚且至氣逆胃鈍臥偏著左噯氣失氣便溏溺赤口膩舌白脈象沉弦在手兼數沉弦為飲左數為肝膽虛熱大抵飲踞於胃則右降不及肝膽風木乘胃之虛則左升有餘矣和胃以滌飲平逆以清絡胃和則飲咳可緩而穀氣可覆逆平則絡痛可止而血不妄行西洋參一錢五分製半夏一錢歸鬚一錢五分海石粉二錢陳皮一錢五分甜杏仁二錢旋覆花包一錢五分竹茹七分雲苓二錢米仁二錢冬瓜子三錢蘆根八寸杭州許咳逆已久的是肺分痰熱未清加以秋陽酷烈肺氣復傷身熱舌乾絳苔厚黃形瘦脈弦明屬濕鬱生熱熱蒸成痰既在肺家只宜清化表不合理補亦壅邪也西洋參一錢五分橘紅一錢五分連喬二錢桑白皮一錢五分甜杏仁二錢川貝母二錢丹皮一錢五分金石斛三錢甘草四分枇杷葉兩片桑葉一錢五分因鼻衄去桑葉加犀角尖八分又胃知味而漸思食食後亦和脈小弦大便未暢小便又渾自是濕熱未曾淨盡之症非陽虛之體補壅非宜而濕熱之邪又黏膩難化靜養緩調自可漸臻安善欲速反有弊他西洋參一錢五分橘紅一錢五分炒穀芽三錢霜桑葉一錢五分甜杏仁二錢茯苓二錢粉丹皮一錢五分荷葉一角金石斛三錢澤瀉一錢五分秫米二錢此方服至便溏暢行泄清熱盡始換後方又養胃存津清心補肺是此症善後之大法西洋參一錢五分茯苓二錢白芍一錢五分甘草四分陳皮一錢五分麥冬一錢五分懷山藥二錢蓮子十粒金石斛三錢棗仁二錢穭豆衣三錢南棗兩枚此方服至胃納復舊之後但有精神疲乏可去洋參茯苓穭豆皮加大生地三錢服後妥適可再加阿膠二錢又秋仲伏氣發病迄今三月餘猶然身熱畏風胃鈍舌刺苔黃口燥脈弦溺黃便溏不爽總屬濕釀為痰痰氣與肝氣相摶阻遏於膽胃之間所以左膺結腫按之覺有痠疼也積久不清竟能成癰宜清肝膽化濕痰埋氣絡法西洋參一錢五分陳皮一錢五分茵陳草一錢五分澤瀉一錢五分炒山梔一錢五分茯苓二錢川貝母三錢桑葉一錢五分小川連四分蛤殼三錢白蒺藜二錢又細參脈症不但肝膽火升痰氣上阻且有秋燥之邪乘虛而入燥火劫金痰氣膠結愈甚所以無形之病漸致有形左膺之腫病異源同前法五劑後即以此方濡潤通和西洋參一錢五分驢皮膠二錢鬱金一錢五分炙甘草四分甜杏仁二錢小生地三錢白芍一錢五分蓮子十粒川貝母二錢白蒺藜二錢丹皮一錢五分杭州張肺胃陽虛飲聚為救八九年來舉發無時去春至今竟無虛日痰稠不爽時或嘔痠口燥消渴動輒喘急頭暈耳鳴心悸便急脈右虛弦左沉澀精氣既虛肺咳難化雖根株未易剪除希冀作止有時西洋參一錢五分阿膠二錢海石粉二錢榧子肉冰糖拌炒七粒甜杏仁二錢桑白皮一錢五分鮮生地三錢川貝母二錢款冬花一錢五分驥村嚴女夏季痰中帶血血雖不多而乾咳至今不止素有便溏嘔酸胃納甚約經行遲而腹痛舌鮮無苔脈數而大此屬脾胃素虛氣血少資生之本本鬱則乘土火炎則爍金久延最易成損調復亦頗難速西洋參一錢五分陳皮一錢五分驢皮膠二錢川百合四錢大麥冬一錢五分茯苓二錢川貝母二錢白蒺藜二錢懷山藥二錢炙草四分硤石馬自春至今咯血竟無虛月秋仲大吐血血去絡空胃脈逆上遂至飲聚咳逆迄今飲濁日以碗計形寒食少便溏上氣不得臥脈虛滯右滑數上損及中之候調復極難宜靜養緩圖之潞黨參二錢麥冬一錢五分款冬花一錢五分茯苓二錢法半夏一錢五分海石粉三錢懷山藥二錢蛤殼三錢全福花包一錢五分又血後咳逆至三月餘自然胃脈虛易以逆舉今飲濁雖少而痰濃難出咳逆不得臥便溏脈數而促損症及中本難挽回姑擬靜藥養胃以闔陽明潞黨參三錢茯苓二錢大熟地三錢蓮心十粒炒香扁豆三錢川貝三錢驢皮膠二錢甜杏仁二錢山藥二錢炙甘草四分杭州吳春初咯血不多越數日咳嗽即作迄今不止右脅背時痛蒸熱舌胖苔黃脈濡左小弦數此屬肺胃濕熱蒸郁傷絡則失血阻氣則作咳也體固氣血兩虛然興利必先除害宜急清養肺胃以和絡止嗽為光毋使久嗽成損西洋參一錢五分陳皮一錢五分杏仁二錢冬瓜子三錢川貝母二錢茯苓二錢米仁三錢鮮生地三錢桑白皮一錢五分炙草四分枇杷葉兩片蘆根血證石門顏自幼陽弱腠疏易感善咳去秋至今咳嗽不止遂致失血屢發血症初起原為驚悸尤鬱而來至於咳久則陽絡勃動所以仲冬及仰秋兩次所吐較多也血屢去則陰亦虛身熱晡盛口燥咽痛側左則脅痛側右則氣逆此肝升太過肺降不及自然之理也凡失血家最忌咳況咳久至半年有餘耶今脈象芤虛弦遲尚無燥擾動數之弊然氣血兩虛已有明證惟宜耐心卻慮善自調養期其緩緩熱退嗽止不致延成損性為宰西洋參一錢五分丹皮一錢五分杏仁二錢川具二錢炙草四分驢皮膠二錢地骨皮一錢五分米仁三錢冬瓜子三錢茅根五錢枇杷葉兩片鮮生地四錢蜜炙紫苑一錢五分杭州周嗜酒之體大便必溏本無足慮過投辛燥熱藥動營壅腑以致鼻血腹脹因脹又進腎氣丸百日腹笥未斂咳嗽反作失血失音脈象弦數氣血乖遠大失沖和矣鮮生地四錢茜草根二錢蒸元參一錢五分川百合四錢川貝母二錢杏仁二錢鹽水泡橘紅一錢五分驢皮膠二錢甘草四分茅根八錢藕節兩枚平望吳素有咳嗽失血發作無時去冬至今已逾兩旬痰清兼嘔時或帶血左眥赤兩額痛不飢不食食即嘔逆脈弦搏肝陽鬱勃化風化火撓金侮土急宜清息羚羊角二錢廣鬱金一錢五分杏仁二錢白蒺藜炒二錢炒山梔一錢五分九孔石決明鹽水煆三錢川貝二錢竹茹薑汁炒一錢粉丹皮一錢五分杭黃菊一錢五分蛤殼三錢霜桑葉一錢五分光按既有咳嘔則此種脈症當用清鎮如旋覆代赭等似不可少盛澤趙去夏瘧後用力勞傷肝膽之絡絡血上溢因形瘦色蒼居平常有頭暈體本陰虛火盛故肝膽易動若是今交初秋屢此復發愈吐愈多濃厚重著將吐之時必先脘下氣聚有形上衝乾咳頭額覺脹迨至血止氣降則噯而矢氣顯屬肝膽鬱勃之火過升無制擾動陽絡之血遂沸騰而出也鬲中作癢大便乾艱氣逆不敢平臥脈象六部皆弦木火內燃有升無降此時自當以平逆鎮肝降氣安絡為要毋使狂瀾不靖致成虛損旋覆花一錢五分九孔石決明三錢懷牛膝一錢五分驢皮膠二錢沉香三分酒炒白芍一錢五分鬱金一錢五分小川連三分參三七一錢穭豆衣三錢胡麻三錢荷葉一角光按此方之沉香不如易代赭為更穩妥又血止後諸恙已平惟脘有瘀痞氣逆輒咳便溏不暢舌鮮口燥脈象虛弦肝胃血虛而氣易逆也宜柔劑通養西洋參一錢五分驢皮膠二錢蛤殼三錢川貝母一錢五分橘皮一錢五分大生地三錢白芍一錢五分胡麻三錢雲苓二錢九孔石決明鹽水煆三錢安吉潘去夏少寐多飲酒熱引動心胃之火以致陽絡血溢秋冬屢發愈發愈多胃絡既空飲食水穀之精微不能遊溢精氣留釀痰濁阻遏升降沖和之氣脈濡如弦弦為飲濡為氣虛而矢所附麗也時當初夏宜和陽治飲為先偏寒偏熱皆非治法潞黨參二錢茯苓二錢琥珀屑一錢竹茹七分製半夏一錢五分陳皮一錢五分穭豆衣三錢蓮子十粒麥門冬一錢五分蛤殼三錢棗仁二錢光按案諮則一線穿成立方則絲絲入蔻平望張失血起於前年原屬因傷動絡去冬復發較多今夏五月初咳嗽痰少至秋初寒熱似瘧是先受濕而後受暑暑濕之邪糾纏至四閱月之久自然絡氣不免震動而血復湧溢也今身熱舌黃胸悶便溏喉癢時咳右脅之痛雖止而脈象弦數左甚於右顯屬濕邪由氣分傷及血分肺胃失降則肝陽易升也宜急為通絡化瘀以清人邪俟血止後再商止嗽要法米仁三錢小川連三分鮮生地四錢茅根五錢杏仁二錢鬱金一錢五分川貝母二錢蘆根八寸冬瓜子三錢茜草根一錢藕節三個又血止後咳勢亦稀稍覺喉癢則咳作而痰為凝夜寐安適胃氣亦和惟潮熱蒸蒸麵黃舌黃渦色渾濁脈右三部虛澀和靜左三部數象亦已退小弦未盡調暢究屬肝鬱不調挾內蘊之濕蒸為熱上熏則食少而咳逆也此時咯血已將安靜可無翻覆湧越之虞但咳嗽已經四月之久必須通腑清濕調肝肅肺務期漸漸熱退咳減為要苡仁三錢杏仁二錢小川連三分橘皮一錢五分川貝母二錢茯苓三錢炒山梔一錢五分桑葉一錢五分鮮生地四錢丹皮一錢五分飛滑石三錢蘆根八寸又投甘涼淡滲苦降之劑以清養肺胃厥陰之氣以滲濕化熱已二旬餘雖熱減食增咳稀寐安然舌苔後半猶有凝黃小溲猶帶黃色陰囊甚至濕癢淋漓頻轉矢氣蒸蒸凝熱易以汗泄足見其濕熱之鬱蒸於肺胃者非伊朝夕矣今脈得左部遲濡右關尺同惟右寸尚見濡滑晨刻痰咳尚較多且厚喉癢宜滋潤肺胃三焦以理氣化存津氣務使濕熱痰濁漸就清澈則胃納充而體氣復陽虛濕勝之體不可遽進呆補西洋參一錢五分橘紅一錢五分澤瀉一錢五分丹皮一錢五分蘆根八寸川貝母三錢茯苓二錢甜杏仁二錢炒山梔一錢五分枇杷葉兩片金石斛三錢米仁三錢鮮生地三錢驢皮膠二錢光按舌黃溲黃陰囊濕癢則下焦之濕熱正復不少用藥仍宜兼顧西雞河沈酒客吐血每發必多已經數年血去既多自然疲憊今秋以來漸增咳逆入夜著枕即咳是胃脈上逆而陽不戀陰也脈右細促數左細弦數論症頗非輕淺矣大熟地四錢天門冬一錢五分川貝母二錢紫石英三錢麥門冬一錢五分驢皮膠二錢海石粉二錢炙甘草四分大生地二錢甜杏仁二錢茯苓二錢光按血後而咳多致不治蓋血止絡寧不加咳嗆漸可復元若咳嗆不已血絡必致復裂再嗆再吐反覆無常不死不已此等方亦不過盡人事耳欲求有效誠憂戛其難矣斜橋程肺胃素有鬱熱加以菸酒辛泄耗氣肋熱是以咳久未止又復咯血血雖不多而熱勢夜甚脈右浮滑數頭暈舌黃此屬胃濕因時而蒸動也議清氣絡以消痰化濕除熱為先米仁三錢桑皮二錢丹皮一錢五分地骨皮一錢五分杏仁二錢瓜蔞二錢川石斛三錢通草七分紫苑一錢五分象貝三錢茅根四錢廬根八寸雙林穆婦經行太早陽明便屬不充去春咯血之後或鬱怒或煩勞輒易舉發今年熱咳時作於今為甚脈弦數舌黃而刺咳嘔便溏又屬肝膽木火挾濕上擾肺胃宜先清氣熄熱莫作揖症用補桑白皮蜜炙一錢五分西洋參一錢五分橘紅一錢五分炒山梔一錢五分地骨皮一錢五分叭甜杏二錢連翹二錢黃芩一錢五分粉丹皮一錢五分川貝母二錢桑葉一錢五分泗安趙失血屢發已三四年今夏獨多近更咳逆痰稠帶血加以額脹耳鳴頭暈口渴胸悶溺黃脈象芤弦此由肝鬱而致胃熱血虛而復受凝暑也先清暑化氣以理其標徐止其咳以治其本舒郁卻慮尤為靜養之要圖西洋參一錢五分橘紅一錢五分丹皮一錢五分荷葉一角甜杏仁一錢金石斛三錢茜草根一錢益元散包三錢川貝母二錢鮮生地三錢枇杷葉兩片桐鄉曹吐血起於去夏至今屢發而多多為胃絡之血然不能左臥咳而兼嘔且有滑泄是胃兼肝矣今胃鈍舌白脈右細弦左反虛小而靜脈左靜是血症之佳兆然細弦是肝邪陰脈今偏見於右當是木乘中土胃不降而肝過升以致陽絡之血上溢不止也肝胃皆宜降議以靜藥降之大熟地三錢白芍一錢五分驢皮膠二錢川百合四錢紫石英三錢紫苑一錢五分潞黨參三錢沉香三分懷山藥二錢蘄艾一錢五分款冬花一錢五分童便半盞又血止後咳逆未罷仍難左臥畏寒是陽虛胃弱偏臥是氣竭肝傷脈微弱神虛怯根蒂未固風浪難經血之暫止不足恃再發深為可尤宜乘平時急為補養照前方去款冬紫苑蘄艾沉香童便加蜜炙黃耆一錢五分川貝母二錢炙甘草四分光按此亦不治之證湖州楊顏上年五月咯血不多即有脅痛咳逆遷延至今內熱脈數咳既不止左脅復痛自然絡血復動矣若咳久不止最易成損急宜養陰滋氣先期熱退脅和然後力圖咳止大生地三錢白芍一錢五分驢皮膠二錢石決明三錢地骨皮一錢五分丹皮一錢五分澤瀉一錢五分懷山藥二錢川貝母二錢茯苓三錢炙甘草四分太湖楊煩勞嗜酒陽虛久矣飲咳年餘冬夏兩次失血先傷氣後動營病勢駸駸入里今氣息短促脈象虛數不免有成損之慮非息心靜養何能充復西洋參一錢五分杏仁二錢款冬花一錢五分榧子肉冰糖炒四粒川貝母三錢蛤殼三錢炙甘草四分驢皮膠二錢茯苓二錢川百合三錢周渡曹素有噯氣原屬肝鬱去冬勞冗傷肝適當春木發動之初咯血左膺痛止而復作是肝陽未靖時沖其絡脈右虛而靜左弦而大弦為肝陽勃動大則為虛宜柔靜之劑育陰潛陽大熟地三錢白芍一錢五分女貞子三錢炙草四分驢皮膠二錢牡蠣二錢旱蓮草二錢藕節兩枚紫石英三錢棗仁二錢穭豆衣三錢又去秋咯血後微咳下發臟毒肺火下移大陽咳勢頓止近復吐血經旬所去過多寒熱盜汗口膩舌滑脈芤弦虛數陽絡空洞痰涎蒸聚陽明虛耗極矣急宜充養陽明以為峻補肝腎之先導息心靜養節勞戒怒毋使久延成損潞黨參二錢陳皮一錢五分懷山藥二錢穭豆衣三錢大有耆一錢五分茯苓二錢川貝母二錢甜杏仁二錢大熟地三錢丹皮一錢五分澤瀉一錢五分嘉興陳前年冬陡然咳嗽吐血過多遂致兩年來咳嗽竟不肯止內熱時寒痰多食少舌光口燥肉削神疲脈象沉細虛數胃腎兩虛虛則成損若能屏棄一切恬神靜養成尚有挽回之望然治法先宜養胃不可紊也西洋參一錢五分杏仁二錢生扁豆三錢炙甘草四分麥門冬一錢五分川百合四錢驢皮膠二錢榧子肉冰糖炒七粒川貝母二錢懷山藥二錢女貞子二錢又去冬咳嗽而失血血雖不多屢發無已迄今仍有凝血痰薄頭脹消渴汗多時或脘腹痞脹脈弦右甚此胃濕內蒸肝陽上逆因之肺不清肅絡血時動宜清肝胃以理肺務使喘止西洋參一錢五分茯苓二錢小川連三分丹皮一錢五分陳皮一錢五分杏仁二錢白蒺藜二錢柔葉一錢川貝母二錢蛤殼三錢黃芩一錢五分藕節兩枚又春間肺感身熱咳嗽胸痛以致血症復發嗣後竟似遇節必發者肺絡未為清養也環唇赤瘰亦屬肺胃之火病發則火內擾故外反似退也血症不宜屢發宜先清上脘之䐜脹無慮也大生地三錢旱蓮草二錢川貝母二錢丹皮一錢五分驢皮膠二錢西洋參一錢五分白蒺藜二錢藕節兩枚女貞子三錢金石斛三錢炙甘草四分吳江許吐血發過兩次止後體無大異今復發每日碗許已旬餘不止微寒而不大熱胸悶能食溺黃肺芤弦虛遲此暑濕蒸郁胃脈逆上絡血隨溢急宜清胃理氣化邪以和絡止血為先犀角尖八分白芍一錢五分連翹二錢茜草根二錢益元散二錢鮮生地三錢丹皮一錢五分杏仁二錢川貝母二錢紫苑一錢五分藕節兩枚茅根四錢西瓜翠衣一錢光按此似陽虛證而認為暑濕蒸郁者其得竅在胸悶能食溺黃若脈之芤弦虛遲尚未足為憑也盛澤汪煩勞多恩慮體本陽虛當此酷暑不耐大氣之發泄加以暑熱外逼肝陽內動以致胃脈逆上陽絡之血驟然湧溢連吐三次去血頗多且易此屬胃血為多與向有失血微有區別迄今半月餘咳逆漸止夜寐尚和其不便左臥及頭量耳鳴等狀皆失血肝虛微有上擾茸診得脈虛濡而靜左手按之良久稍見弦象舌苔滑膩口淡便瀉忽作忽止溺尤短數足見血後陽明空洞厥陰風木易動難熄宜用血脫益氣法和胃熄肝並進潞黨參二錢陳皮一錢五分炒香扁豆三錢棗仁二錢懷山藥二錢茯苓二錢穭豆衣二錢蓮子十粒川百合四錢白芍一錢五分驢皮膠二錢藕節兩枚胥塘陳婦數年來咳嘔曾無虛日達節必吐血其所以咳嘔吐血者皆屬氣逆之故甚或不能平臥食少內熱經候愆期脈虛澀此衝任不足易致逆舉非僅肺胃為病積年虛症調復不易大熟地三錢歸身二錢驢皮膠二錢懷山藥二錢枸杞子二錢白芍一錢五分左牡蠣二錢炙甘草四分紫石英三錢川貝二錢餘杭費咳嗽三四年時或失血去秋以來更加便血溏則不多溺渾脈弦大肺胃大腸濕熱蒸郁久而不化陰陽之絡皆傷矣然治咳難而治血易宜先戒酒西洋參二錢杏仁二錢炒荊芥三錢椿根白皮三錢川貝母二錢茯苓二錢炒冬朮一錢五分柿餅半枚驢皮膠二錢炙草四分荷葉一角杭州沈肝陽遏鬱郁極上乘衝動大絡則右脅痞悶作痛咯痰如膠時或失血得噯氣與矢氣則稍快素易夢泄亦屬肝腎之熱宜先和絡化滯以防血溢過多歸鬚二錢旋覆花一錢五分包川鬱金一錢五分荸薺兩枚米仁三錢海石粉二錢漂青黛一錢陳海蜇二錢蛤殼三錢川貝母二錢橘紅一錢五分臨平鐘體肥陽明偏旺幼即患頭痛兼吐痰血近年來酒熱助胃濕火痰濁益甚今春來咳嗽痰血較去秋更劇便難胃鈍氣逆火升豚弦滑數此皆陽明失隊痰火內蘊宜通降宜清養陽已能戒酒可望全愈也西洋參一錢五分知母一錢五分蘇子一錢五分雞距子二錢煨石膏二錢杏仁二錢米仁三錢枇杷葉兩片川貝母二錢陳皮一錢五分茅根四錢嘉善許向有乾咳氣逆之症每發必咳甚不能平臥向發於冬時為盛此心火凌金之咳既經多年肺胃陽絡受其衝擊久矣當此流火爍金之令絡血妄動煩渴內熾須進甘涼所由至矣今脈芤虛而靜小論症情尚可無礙但肺金素虛心火易熾靜養善調究不可忽西洋參二錢杏仁二錢川貝母二錢元參一錢五分鮮生地三錢金石斛三錢蓮子十粒枇杷葉兩片驢皮膠二錢益元散三錢藕節兩枚桐鄉孫秋冬咳逆少痰匝月復繼以吐血血後咳逆無故反加胸次隱痛此屬陽虛痰飲內踞久則胃絡血湧血去之後煩勞不能靜養以致痰飲瘀血膹郁中宮今喘咳短氣舌黃脈弦凡胃脈逆上血家大忌論症頗非輕淺潞黨參二錢陳皮一錢五分沉香三分驢皮膠二錢旋覆花一錢五分茯苓二錢炙草四分參三七一錢炙大有耆一錢五分蘇子一錢五分新絳一錢光按此不治之症方卻清靈可喜馬窯陳痰飲為咳起於秋季雖經屢次失血甚少至春叉復稍來是春木隱隱勃動上擾陽絡故復連吐三日血去過多凡咳而兼嘔痰薄而稠本屬胃家痰飲為咳咳久則胃脈逆上血熱沸湧所以上越過多今雖脈象靜小而咳引胸痛便難口燥多夢紛紜尚屬陽明氣火上壅未能通降猶恐絡血復動急宜清肺疏腑以化熱安絡為要西洋參一錢五分杏仁二錢粉丹皮一錢五分米仁三錢鮮生地三錢橘紅一錢五分參三七一錢藕節兩枚犀角尖六分蘇子一錢五分白芍一錢五分上柏李上年夏秋寒熱往來繼以吐血過多痔瘍遂致咳嗽右腹時痛近進附桂等劑咳逆益熾咽痛皆發脈數最防絡血大來深為可慮小生地三錢西洋參二錢杏仁二錢炙草四分金石斛二錢川貝母二錢陳皮一錢五分白芍一錢五分青皮八分元胡索一錢五分荔子核兩枚嘉興繆每日午後必覺脘痛已十數年矣去春咳嗽起至今吐血後咳逆蒸熱舌白溺黃胃鈍脈虛素來酒多谷少中陽大虛慎勿輕視潞黨參三錢陳皮一錢五分澤瀉一錢五分炒扁豆三錢懷山藥二錢茯苓二錢蛤殼三錢榧子肉冰糖炒十粒製半夏一錢麥冬一錢五分炙草四分竹茹一錢屠鎮朱滑泄舌心光苔膩此屬心胃虛熱濕火下注冬來交節輒見咯血蒸熱溺黃脈濡弦亦屬濕熱蒸郁之象未可遽進壅補反助相火西洋參二錢陳皮一錢五分粉丹皮一錢五分蓮子十粒金石斛三錢茯苓二錢澤瀉二錢藕節兩枚驢皮膠二錢米仁三錢川貝母二錢茅根四錢光按吐血之證其因多端不可一概施治熱者寒之虛者補之傷者理之肝胃上逆者清之鎮之肺絡咳傷者調養之繆氏三訣頗能扼要千里醫案卷四腫脹面論孫平叔宮保病案大人體豐胃強飲啖有兼人之量加以節性褆躬誠為松柏貞固矣兩年來腫症屢發其發也腫自下起由足及腹上至頭面手臂甚則痰多食少動輒氣逆不能平臥莖囊俱腫小溲淋漓其退也大都專科以草藥為丸為醴峻劑逐水或從兩足旁溢或從大腸直瀉所用之藥雖秘不肯泄然投劑少而見效速其峻利可知矣且嘗其味辛澀刺喉所當僅似黍米而味留舌本逾時不去則其峻利又可知矣自前年秋冬至今翻覆再四其情狀大略如斯今診得脈象右三部弦而虛其弦見於浮中兩候為多在手因偏倚支撐氣滯益甚皮膚腫厚按之至骨關位微細寸尺尤甚神色痿瘁氣機促逆項以代頭尻以代踵痰稠色黑咯略難出溺少欠利其色黃赤日食不過四五蓋而飯僅得其一雖唇黑缺盆平臍突足心漏背平等惡候俱尚未見且幸神色不衰音吐洪亮然亦疲憊矣夫水腫之為病不一而其為狀亦不一初則日積月盛久必氾濫盈溢來去聚散莫可端倪倏起倏滅與身中之元氣相為倚伏消長屢攻屢退屢退屢復其復也病者咎醫者之治理未明醫者咎病者之調養失宜不知水腫之為病本如是其反覆無常也夫治水之逆行所無事耳疏鑿決排堤防導引皆宜就水之性以順其流源流既須明辨次第尤當詳察稍不如法鮮秦膚功今承明問究厥指歸將正其名則支飲為本皮水為標將究其流則思慮傷脾勞怒傷肝蓋脾不能為胃行其津液則水穀酒醴肥甘不能輸精布氣連中樞以達於四末留釀淫溢皆為痰飲水濁加以肝風鼓盪湧越則所眾之陰濁排驅殼廓胸脅遏經隧壅膚膠以致便溺皆澀寢食俱廢無所不至害有難以盡言者故愚謂蓄而聚者為飲盈而溢者為水飲為水之源水為飲之流非徒逐水可以奏功又必究極其飲非徒滌飲可以了事又必探討其所以聚飲之源況此症又有風木之邪乘間竊發或推或挽乎況又賢勞如此倚毗愛戴如此以六旬之高年困兩載之積患末學淺陋而欲藉箸代籌計出萬全不啻如鱉戴之重矣竭思殫力以圖報稱必將和肝脾開鬼門潔淨府三者雖有主客輕重先後緩急然可遍廢乎脾復其輸運之職肝復其疏泄之常則氾濫者或可循途歸壑湧溢者庶幾風息浪恬今專科投劑逾旬似獲小效而剋期又不迂曠且竊觀其用法亦似小有操縱者敬遵鈞諭徐俟其成效而樂與安瀾之慶再容退而靜思博攻醫籍以備萬一馳驅之用謹論列如左光按抑揚宛轉說理透而論治明非大手筆不能次日又陳諸藥皆停緣由昨日晉謁竊觀大人色脈神氣皆似憊不可支腫既復盛溺又漸少而鈞諭諄諄與左右侍奉之人似皆以為舍利水之外更無緊要之著而不知水之為病在腎為本在肺為標脾土既無堤防肝風又加鼓湯愈壅愈逐愈逐愈壅馴至中州陸瀋水泉下竭猶復斷除食味屢進疏鑿天下豈有糧餉不繼轉戰無前尚可望其收功末路者乎此蓋由於專科之醫草澤無知守一已之口傳圖僥倖於萬一以治藥藿勞形之法概施之君民倚頓之身效則國之福也不效則雖食其肉猶可逭乎此愚之所以痛心疾首而進停藥之說也夫藥猶兵也不得已則用之以去病耳表散攻逐所以去病也溫清和解所以補偏救弊以適於中也然猶有補益培養之法在即或病未盡去而正已先虛尚有攻補兼施補瀉間進等法參互錯綜馴至於利而無弊從未有病經兩年發已數次不辨病之淺深體之虛實只以峻下一法為可屢投而屢效也差此症之起由飲啖兼人胃強脾弱繼則尤勞過皮氣竭肝傷飲食所入脾不能為胃行其津液上輪於肺下利膀胱通調水道流之壅由於源之塞不探其本而從逐其流豈止鄰國為壑哉將必竭一身之津液血氣盡付沃宜漏卮無當涸可立待故愚以為此時之腫非水也氣也此時之溲澀非水道之不通水泉之已竭也若再守飲食之厲禁進暴戾之刻劑初何異剿寇用兵而無節制則兵反為寇濟師無餉而專驅迫則民盡為讎大人何忍以千金之軀輕供孤注之一擲也然專科之攻伐既不可用矣而補養之劑何以又不亟進差草藥悍烈之性留於中者未必盡化遽以補養之藥接踵而進不但慮其反兵為鬥且恐助其虐而滋其戾夫藉寇兵資盜糧誠不如安堵休兵待時而動之為萬全也擾攘之後相與休息古人有糜粥充養之法伏望大人放下萬緣靜養數日返觀內聽與病相忘頻進糜粥以養其胃侯其胃中衝和之氣稍稍來復灌溉周易濡養百脈充滿然後流動將必有不期腫之退而自退不期溲之利而自利者苟或不然然後審機度勢計出萬全大人之師定能貞吉又或不然則專科草藥仍在也更進而謀之或不慮飢兵之噪矣敬疏諸藥皆停緣由以答明問惟鑑納是幸光按停藥以待胃氣之來復此等議論可發前人所未發論楊拙園明經病案胃納稍增大便較潤目是可喜但旬日久病僅投三劑見效必不能多腹脹何能遽減即是右足之痹原屬濕邪阻絡濕是地之氣主陰受於下者必升於上自覺冷者正屬陰濕之邪未化既云陰濕何不用溫熱而反用苦燥乎蓋尊丈體多肝火凡有肝火者雖受陰濕亦易化熱也況病起顴頓陽明部升胃氣反致引動肝脾伏火伏濕由足之絡上行入腑以致腹滿氣逆耳濕以下趨為順脾胃皆以降為和故前日拙方主乎通降腑絡以導濕下趁也凡病機不一有宜投劑輒效者如傷寒卒中暴疾是也有宜緩為調劑者如高年久病以及糾纏傳變之類是也不審病機之宜緩宜急而專以急功欲速鮮有不僨事者務期耐心多服至數十劑外然後換方光按論用藥之宜緩宜急確是不磨之論但近世人無恆心一二劑不效早已易轍欲求全愈誠非易事故醫者有定識已屬難事病者有堅忍心更為難求矣湖州王六月初腫自面起漸及腹肢莖囊漸致食減便泄迄今兩月舌黃有刺脈浮而濡經謂腫自上起者當開鬼門腫盛於下者當先治其上蓋言水腫之挾風者必先發汗也今面腫於身是病之主症未退而食減便池則脾胃之土德已薄何以防堤氾濫時已秋矣腫盛必喘若咳逆喉作水雞聲倚息不能臥則肺之通調水道下輸膀胱之權益弛竊恐尤占滅頂既形之腫固難退退亦易復而未形之喘必將至至更難御急須消患於未萌後圖祟土御水之計蜜炙麻黃三分五味子十粒廣皮五錢豬苓五錢生薑皮三分杏仁二錢米仁三錢黨參一錢澤瀉五錢炙草四錢茯苓皮五錢蘇葉一錢蘆根八寸泗安李前年冬陡覺面浮氣急延至肢體皆腫此因風水為病奈體素濕勝肺既上痹腑亦下滯以致遷延反覆迄今仍然偏體皆腫便溺赤澀不能平臥舌光乾燥脈沉鬱欲疏府必先理氣欲理氣必先宣肺恙腫極最慮喘也蜜炙麻黃三分杏仁二錢甘遂末五分茯苓皮四錢煨石羔二錢五分乾薑搗五味十粒西洋參一錢五分大棗兩枚炙甘草四分甜葶藶四分此方服至嗿爽痰多凝汗津津漸能平臥接服後方西洋參二錢蜜炙桑皮一錢五分甘遂末五分枇杷葉兩片橘皮一錢五分豬苓一錢五分商陸根五分絲瓜絡三錢茯苓四錢澤瀉一錢五分木防己一錢五分又腫喘俱減七八微咳便溏氣易上逆脈右濡左弦大凡水腫之症最易翻覆暫效未足全恃此時宜和陽調中為御水之本熄風養肝為因時之制冀其無推波助瀾之弊潞黨參二錢陳皮一錢五分驢皮膠二錢赤豆皮三錢生冬朮一錢五分茯苓三錢穭豆皮三錢桑葉一錢五分乾薑搗五味十粒丹皮一錢五分炙甘草四分絲瓜絡三錢光按案語謂水腫之症最易翻覆實闊歷有得之言德清沈咳嗽音窒氣逆數年來易發難已是肺氣之虛痹久矣虛痹則治節不行而通調水道下輸膀胱之職弛而水氣氾濫中土卑濕不能樞連矣況腫喘並盛脈濡舌鮮理宜先理中上慎勿欲速遽投溫熱滋膩有礙脾胃潞黨參二錢甘草四分大腹皮一錢五分米仁三錢蜜炙麻黃三分陳皮一錢五分桑白皮二錢生薑皮三分杏仁二錢茯苓皮四錢光按當加生石羔金家張素體平弱陽虛濕勝營耗肝滯左脅下舊有肝積兼之便溏下血時作時止自十餘歲至今矣其脾胃之不和如此則上既無以資肺之氣下亦無以御肝之侮故入春少寐盜汗是脾陰不充也春抄之能食不為肌膚是脾陽之不用也中樞無健運之權無怪其當濕土之交而驟見腹滿也今脈象濡弱舌乾齒燥肉削肌嬴咳嗽痰氣有音飢不能食便數溺少總之皆脾胃肺氣虛已極健運之權弛而氣化之機廢此臌症之極重者若喘瀉一見便難措手補既壅滯難勝瀉又虛羸不合惟有從宣氣疏腑一法希冀萬一西洋參一錢五分大腹皮二錢麩炒枳殼八分枇杷葉兩張茯苓皮四錢川貝母二錢炒穀芽三錢蘆根八寸陳皮一錢五分豬苓一錢五分炙甘草四分光按此方太輕當從肝脾著想石門趙喘雖不盛痰氣尚逆脈濡舌白先咳而後腫先治其肺況腫勢盛於下半明屬濕蒸府痹治腑以理氣為先故專理痰氣之逆西洋參一錢五分橘皮一錢五分丹皮一錢五分枇杷葉兩張茯苓皮四錢杏仁二錢大腹皮二錢蘆根八寸旋覆花一錢五分桑皮一錢五分川貝二錢南潯王婦去年痎瘧原屬暑濕鬱於氣分阻遏營衛運行之常故時有閏餘之瘧參錯其間至春血阻而經不行自氣痹而腫腫先於頭面及至陰之地至陰厥陰也厥陰為肝肝本與膽為表裡此瘧腫之所由迭起也肝本為風臟交春則風木內動風鼓濕動則頭面先腫也遷延至今濕熱薰蒸於內風陽鼓動於外加以情志或有不調飲食或有不節則清陽升降之機益形窒滯而腫及周身脹至於廢食也頃喉間呼吸有音而領下如垂瘧狀反輕而微時或便乾而數圊溺少而氣穢齒燥口乾舌質砂白脈象左弦數而右沉弦數實臍突背平是又脾肺大失通降之權而肝氣益橫逆矣急須緩劑以理氣平逆為先必得喘汗不至庶乎可望遷延而開生機之一線旋覆花一錢五分前胡一錢五分雲苓二錢小川連三分大腹皮一錢五分沉香三分紫苑一錢五分生薑皮三分五茄皮二錢橘皮一錢五分桑皮一錢五分絲瓜絡三錢光按此症與瘧迭起仍當用越脾法加減關王廟吳咳嗽四五月才止春木司令即兩脅走注作痛入秋漸增腹滿足腫筋見青色食少䐜脹脈弦沈附骨此屬鬱怒傷肝痰阻氣痹中滿已成難許見效西洋參一錢五分陳皮一錢五分蛤殼三錢海石紛二錢桑白皮一錢五分茯苓三錢米仁三錢絲瓜絡三錢大腹皮二錢蘇子一錢五分川貝二錢枇杷葉兩片又上嘔痰飲下瀉瘀血陽明似有通運之機雖飲食稍進脈象稍起而蘊蒸之濕外達為黃內阻為脹滿者豈能易化故論症仍在險途西洋參一錢五分小川連四分川黃柏一錢五分左牡蠣三錢陳皮一錢五分茵陳蒿一錢雞內金一錢五分生穀芽二錢茯苓皮四錢炒山梔一錢五分炒澤瀉一錢五分光按此亦肝脾兩傷之症湖李幼有哮嗽近雖不發痰飲內聚阻肺胃升降之氣加以肝鬱不調順乘中土以致入夜腹必攻脹而湯飲香燥皆不能受脈象小弦宜用緩調議通陽滌飲條肝法潞黨參二錢陳皮一錢五分生冬朮一錢五分枳實五分製半夏一錢五分茯苓二錢炙甘草四分白芍一錢五分青皮一錢澤瀉一錢五分制香附一錢五分平羅王內有煙辛燥劫外有瘡疥浸淫燥濕二氣內外交迫脾胃大失通和之序八月初燥令大行大腸燥金氣膹以致脘腹膨脹疼痛泄利不爽迄今三月脈之關尺猶然弦堅而數取效諒難欲速議通養腸腑以闔陽明為主潞黨參二錢陳皮一錢五分枳殼八分驢皮膠二錢懷山藥二錢茯苓二錢白芍一錢五分炙甘草四分炒黑荊芥三錢桔梗三分炒槐米一錢五分柿餅半枚王店張嗜酒煩勞二者皆傷陽氣陽虛者濕必勝況酒易釀濕乎今夏濕土司令之時胃納驟鈍則中陽益虛以致足跗先腫濕盛於下也浸假而至腫勢日上漸及腿髀莖囊腰腹則腫盛於下者當先治其下也腫盛必喘是濕濁上於清陽也今溺少而黃膚腠似癍似瘰似痱皆濕火內蘊之的據況舌胖大而鮮赤陽明亦有火矣脈沉遲宜專以扶陽化濕宗古人病在驅殼經隧者毋犯臟腑之訓緩以圖功生術冬一錢五分陳皮一錢五分大腹皮二錢商陸根五分木防已一錢五分米仁三錢五茄皮二錢潞黨參二錢赤苓皮四錢甘遂末五分桑皮一錢五分絲瓜絡三錢光掃既曰陽虛濕勝則商陸甘遂總嫌太峻且外見癍疹形則邪已入於肌腠正可用越婢法迎機導之徒用攻下無益又陽虛不復恣啖生冷中陽受傷上逆為呃下壅為腫汗多食減舌鮮苔黃便乾溺澀少而赤脈沉微遲澀凡陽虛者濕必勝此物理之自熱故水腫之反覆皆當責諸陽虛也第此中有區別焉今陽雖虛而濕又甚一味補陽未免助濕宜用通陽法以調中疏腑冀其呃即止腫緩退切宜樽節飲食毋使壅遏其式微之陽潞黨參法半夏米仁大腹皮生冬朮陳皮澤瀉廣藿香茯苓皮木防己生薑皮絲瓜絡又飲食不節驟傷中陽以致呃逆人身之陽宜通運不宜壅遏既陽傷呃作則不能敷布極矣所以水肺舊恙復作凡水腫多門其源不外脾肺腎其治法不外開鬼門潔淨府實脾溫腎今腫由下漸及於上便澀溺少舌鮮苔白脈沉澀喉間痰氣有音啖肥濃有味而杳不思谷其為肺失治節胃不致布顯然此時宜宣肺養胃以調氣化資穀氣為要俾不致水濁上潛清陽日窒而遽增喘逆則可緩冀腫退蜜炙麻黃三分杏仁二錢乾薑搗五味十粒西洋參一錢五分蜜炙石羔一錢五分米仁三錢茯苓皮四錢木防己一錢五分炙甘草四分陳皮一錢五分枇杷葉兩片蘭葉十片光按方論俱佳武康方曉帆秋間泄痢時作時止而脾胃蘊結之濕熱究未清化入冬燥邪搏肺肺氣不能清肅則脾胃之承流宣化者益滯以致咳嗽腫滿交作今腹膨妨食夜尤欠運多坐則囊足即腫溺渾便溏不爽脈弦數右甚急宜疏理痰氣以潤其輸運為先蘇子一錢五分萊菔子二錢五加皮二錢茯苓皮四錢杏仁一錢白芥子一錢大腹皮二錢地骨皮一錢五分生蓄皮三分米仁三錢雞內金一錢五分痰飲長興俞勞郁太過陽淤肝橫順侮所勝久則飲食不能遊溢精氣聚而為飲舉發無時痛嘔交作已經多年脘脅胸背皆為凌之所駕輕就熟理難驟止舌淡白而黃脈遲弦而虛面黃筋掣主客兩虛矣宜平時用丸以養肝和胃發時用煎以溫中禦侮曠日持久有備無患庶乎有濟矣潞黨參二錢小川連四分枳實五分桂枝二分生冬朮一錢五分雲苓二錢炙草四分乾薑四錢熟附子三分又丸方潞黨參二兩大熟地二兩柏子仁三兩蛤殼三兩生冬朮一兩五錢小茴香一兩川楝子二兩海石粉二兩雲苓二兩泡吳萸三錢白芍一兩五錢黑芝麻二兩右共為末棗肉為丸早晚二服每次三錢荔枝橘餅湯下光按痰飲之症極多此篇句句經驗當熟玩之大窖沈婦體豐陽虛飲聚氣滯由來久矣交春木氣司令肝膽易動順乘陽明逼動心營以致脘腹攻脹心悸頭暈耳鳴舌光少寐多汗火升足清食減不飢雖痰飲吐咯究難清澈痰火膠結津氣易奪大氣升泄之時尤慮氣火妄動汗液易泄也今脈得寸關濡弦滑數總屬痰火二者交相為病氣即是火平氣即所以清火汗多亡陽斂汗即所以和陽再加滌飲以和胃胃和則啖食漸安而心營自不至妄動肝膽自不至僭擾也西洋參一錢五分製半夏一錢五分炒枳實五分蜜炙黃耆一錢五分浮小麥三錢麥冬一錢五分煆牡蠣三錢陳皮一錢五分穭豆衣三錢竹茹一錢雲茯苓二錢旋覆花包一錢五分蛤殼三錢生白芍一錢五分新勝朱進通陽飲方法寒熱之狀已退飲咳已減六七然舌苔白膩脈左浮弦右脅隱痛大便僅行一度小便猶然短赤尚屬餘飲宋盡留踞中州以致便溺未能通行肝陽不免易動議仍通陽和飲為主疏腑潤肝為佐潞黨參二錢陳皮一錢五分米仁三錢炒枳殼五分生冬朮一錢五分茯苓三錢蛤殼三錢竹茹生薑一片同搗七分宋半夏一錢五分杏仁二錢豬苓二錢大棗兩枚新市範髀厭之痛雖由勞傷後因發癍而愈是必有風寒外襲比來肢體畏寒晨起痰飲湧溢食少便堅脘中不和脈來弦滑猶屬寒遏衛陽飲踞中脘之象擬和陽滌飲法以通中州潞黨參三錢陳皮一錢五分桂枝三分生薑皮三分製半夏八分雲苓二錢白芍一錢五分竹茹七分生冬朮一錢五分炙草四分蘇子一錢五分錢邱範痰飲之聚原由陽虛高年脾胃運化力遲水穀之濕釀為痰飲每每有之如古人三子養親等方雖為治標亦有至理今精氣飲食已復而脈弦有飲亦當實諸脾胃運化之遲時當濕土宜參和胃益脾以助穀氣之運潞黨參三兩法半夏一兩五錢木香六錢萊菔子二兩生冬朮一兩五錢陳皮一兩五錢穀芽三兩歸身一兩五錢雲茯苓二兩炙草四錢白芍一兩五錢砂仁一兩五錢蘇子一兩五錢水丸晨服三錢服晚四錢蓮子湯下光按此方通補中陽頗妙丸服更當石門馬脾胃陽虛易受難運水穀酒醴半釀痰濁循絡旁行則為臂麻或疼溢冒上行則為頭眩氾濫於中道則為咳嘔便溏充斥乎營衛則為汗泄為肢清此皆痰飲之為患也去痰飲之源在補脾和胃節痰飲之流在節飲食今痰飲兼至尚宜和陽之中參以清熱化濕為時在濕土潮令因時制宜之法也雲苓三錢炙甘草四分小川連三分海石粉二錢桂技三分法半夏一錢蛤粉三錢澤瀉一錢五分生冬朮一錢五分廣陳皮一錢五分生薑皮三分又新涼外束宿飲內動左臂大痛痰飲不多四五十日才得痰少痛緩然身凝熱脈尚沈著餘邪與飲俱未盡化也雲苓三錢桂枝三分米仁三錢木防己一錢五分生冬朮一錢五分川烏三分陳皮一錢五分炙甘草四分煨石羔二錢五分豬苓一錢五分或痛久而無效者另服活絡丹二分陳酒下德清胡夏末寒熱咳嗽右脅動即覺痛時或帶血迄今脅和血止而痰多脘痞食少欠連不能平臥脈滑而堅兩關尤甚支飲未和肝陽又逆肺胃益難通降矣蘇子一錢五分蛤殼三錢海石粉二錢萊菔子二錢西洋參一錢五分陳皮一錢五分白芥子一錢五分花苓二錢杏仁二錢嘉興王向有失血頻發據述情狀自是胃絡怒傷之血今春外感咳久肺傷復致吐瘀近來寒熱咳嗽皆上而動輒氣逆脈堅弦弦為飲堅為肝陰虛陰虛則肝無以養飲聚則氣易上逆也黨參二錢蛤殼三錢旋覆花一錢五分炙甘草四分陳皮一錢五分白芍一錢五分驢皮膠二錢茯苓二錢澤瀉一錢五分左牡蠣二錢光按案語老煉方亦合拍海寧封吐血成盆是胃血也胃本多氣多血往秋血症復發胃脈逆舉血動則氣亦動凡胃中蘊結之痰飲濕濁亦無不隨氣以動痰飲濕濁皆陰之屬也故陽為鬱而不敷布則晨起惡風病經半年餘所投無非溫補膩滯則陽益不能通連而痰益聚右脅下漉漉有聲厥氣上逆或痞聚於中或梗塞於內或浮越於肌肉膚膜則不耐起坐仰息沃沫嘔噯食少大便乾溏泄瀉不一小便渾赤而少身處重幃畏風如虎種種具在矣陽虛胃弱則宜通和濕濁內蒸則宜淡滲痰飲內聚則宜滌逐病機如此然久病至此才思振理諒難速效也西洋參一錢五分陳皮一錢五分豬苓一錢五分白疾藜二錢旋覆花一錢五分茯苓二錢澤瀉一錢五分絲瓜絡三錢宋半夏一錢五分蛤殼三錢米仁二錢薑汁炒竹茹一錢光按此症吐血復兼痰飲溫補柔膩俱在禁例須看其用藥靈動處所謂成如容易卻艱辛匠人港王癍發數月才退膚腠間尚有瞤惕麻痹痰飲黏膩舌苔黃滑脈象濡弦右部兼滑總之陽明水穀之濕易釀痰濁以致脾肺之輸運難速宜清養肺胃之陰以連脾氣遠剛用柔從秋令也西洋參二錢穭豆衣三錢陳皮一錢五分米仁三錢驢皮膠二錢懷山藥二錢雲苓二錢秫米二錢川貝母二錢霜桑葉一錢五分丹皮一錢五分周渡曹婦晨刻嘔沫頭運耳鳴由來久矣今年濡瀉自春至秋才止左脅痛漸及左背肋舌苔或黃或灰胃鈍脈濡此痰飲稽留於肝膽之格而為痛前次之瀉亦痰瀉也未可竟作血虛肝病論治歸鬚一錢五分旋覆花一錢五分鬱金一錢五分茯苓二錢薏苡仁三錢白蒺藜二錢陳皮一錢五分驢皮膠二錢西洋參一錢五分法半夏一錢絲風絡三錢海鹽朱云樵煩勞傷陽陽虛則飲聚現病種種都屬痰飲為病蓋煩勞二字原該勞心勞力而言傷陽二字亦不專指一臟一腑之陽惟其陽虛則水穀之入胃不能遊溢橢氣上歸於脾與肺而通調水道下輸膀胱之常皆乖其度留釀飲濁阻遏清陽不能升降舒連所以先見口淡食減口淡胃陽虛也食減胃氣滯也繼見短氣金匱所云短氣者其人有微飲微者言飲之不多而屬於陽虛也馴致左脅下漉漉有聲按摩之稍若通運是飲聚肝膽部分而漸著其形也加之右腿麻是飲之聚於陽明大絡也左臂痹是飲之聚於旁絡也惟其飲微故無大創惟其陽虛故久不愈然陽虛飲聚原是一貫至於營陰亦虧是體之虛而又虛也迄今經年投劑已多而未見成效者是徒知其虛而漫投補益網絡原野而不知從痰飲入想用補也金匱明明有短氣有微飲者苓桂朮甘湯主之腎氣丸亦主之二條既雲苓桂術甘通其陽何以又贅入復出腎氣丸以納其陰中之陽乎其云亦主之者正示人以智慧無窮而其理又平易切實蓋短氣不獨肺主出氣不足而腎之納氣亦無權矣微飲妨陽自宜宣通微飲挾陰氣而上逆致呼吸不利甚至吸氣短則即宜通九淵下蟄之陽以期龍雷下潛而不致飛騰不妨用奠定系維之法並行也經旨昭明正與此症吻合腎氣之納下不可緩矣其苓桂術甘之治上者尚嫌其力微而功淺且性純陽易動目下冬藏之時固應如是然冬至蟄將動又宜稍以靜藥控制之病之理治之法粗陳梗概如此不過病之由來積漸非伊朝夕未能欲速也宜節勞怒慎起居下數月靜養功夫自可漸期康復光按說明痰飲原委闡明經旨纖悉靡遺令人一讀一擊節茯苓三錢生冬朮一錢五分潞黨參三錢桂枝三分炙甘草四分白芍一錢五分陳皮一錢五分五味子乾薑一分同搗十粒大棗兩枚丸方大熟地三兩淮山藥二兩茯苓三兩丹皮一兩五錢山萸肉一兩五錢淡附子三錢澤瀉一兩五錢桂枝三錢右共為末煉蜜為丸早晚兩服每服四錢淡鹽湯下今有河車山藥之丸或纂入錢許同服至立春止又來信諸知症漸有退意第起坐仍覺短氣左脅下飲踞如故則飲之根株尚未刻除時屆春令虛陽不免易動宜將腎氣丸中之桂附稍減每晨用淡鹽湯下三錢每晚臨臥用蓮子湯下黑歸脾丸四五錢為春夏之交治法其黑歸脾丸料宜酌之湖州金本屬陽虛之體酷嗜茶酒久而聚飲時苦右脅痛控引胸背短氣口乾反不渴飲便溏溺澀必吐涎沫腸胃轆轉有聲始得痛止而凡酒家必易聚飲況平時喜甘味今脈亦沉弦則陽虛飲踞無疑矣宜節飲節勞常服甘藥以和之茯苓三錢生冬朮一錢五分法半夏一錢五分竹茹生薑同揭七分桂技三分炙甘草四分枳實五分生薑皮三分陳皮一錢五分潞黨參三錢大棗兩枚梳妝橋沈身熱不壯經月不解脘痞右逆有形自覺湯飲入胃皆痞滯不運今耳聾舌絳雖退便溏腰痠手足疼間有錯語豚虛澀此屬嗜酒陽微之體痰飲濕濁留踞中宮則陽虛不得敷布及於四末時漸深秋深恐轉痢殊非輕候潞黨參陳皮法半夏麥冬桂枝木茯苓白芍炙草蘇子蛤殼竹茹疝軋村顧兩睪丸上控自幼如此則素有筋疝筋疝必易舉而善泄力不能及遠宜結褵多年而未育也脈得左弦且數宜養肝以治疝若亂投壯陽補腎恐反滋夢泄淋滑之弊且此時斷難欲速宜丸以緩調並能節欲尤妙大生地四兩金鈴子二兩元胡索二兩山萸肉二兩歸身二兩小茴香一兩橘核二兩懷山藥二兩白芍一兩五錢粉丹皮一兩五錢杜仲二兩韭子一兩右藥研末蜜丸早晚各服三錢白滾湯下嘉興曹腹痛無定時亦無定所攻鳴有聲而無形得噯與矢氣則稍舒經久不已脈沉而澀此屬厥陰氣鬱而為沖疝也宜柔養其體疏調其用久久自可漸愈大熟地三錢歸身二錢小茴香一錢火麻仁二錢紫石英三錢白芍一錢五分金鈴子兩枚炙甘草四分胡蘆巴一錢橘核二錢青皮八分又沖氣自左上逆俶擾於脘腹胸脅或嘔或痛作止不常已經年許脈左弦舌黃時有寒熱者即厥陰之為病痛苦寒熱也此屬肝陽鬱結聚為沖疝宜滋養肝陰以調其氣歸鬚一錢五分小茴香一錢五分茯苓三錢吳茱萸三分韭白兩枚白芍一錢五分元胡索一錢五分青皮八分荔枝核兩枚陳皮一錢五分川楝子兩枚橘核二錢海藻二錢洞庭山徐幼患沖疝發則睪丸控引入腹而痛愈後越五六年因瘧致鼻衄衄後脘痛屢發發必由右而上妨食便閉必快吐便行而後漸平此仍屬疝之上逆脈得弦而近數仍宜從疝沖為病論治丸以緩調差久病根深非能速效耳大熟地三兩歸身二兩青皮八錢吳茱萸三錢荔子核三兩川楝子二兩白芍一兩五錢海藻二兩玄胡索二兩小茴香一兩橘核二兩木香六錢茯苓二兩蜜丸早晚每服二錢陳米湯下徽州洪狐疝偏右多年矣疝為任脈之病有所觸忤實則下連肝氣虛則內連沖逆今年春初即發腹痛攻逆是二者兼有之矣然治法仍以疝為主歸身二錢元胡索一錢五分橘核三錢小茴香二錢白芍一錢五分川楝子兩枚青皮一錢荔子核兩枚木吞六分吳茱萸三分茯苓二錢上海楊初冬疝攻腹痛此屬勞倦傷陽飲食阻腑厥陰之氣挾任脈逆行而為痛冬底復感溫邪咳嗽咽乾今口渴舌鮮脈濡弦宜清養肺胃兼調任脈法西洋參二錢杏仁二錢小青皮八分牛旁子二錢川貝母二錢陳皮一錢五分白芍一錢五分炙甘草四分川楝子二枚蘇子一錢五分元胡索二錢老韭白一錢光按疝症諸方俱妥貼易施寒疝宿飲平望李症情錯雜歷久迭發不已多屬寒疝宿飲二者為病據述自幼有症疝攻於下必致飲聚於中蓋疝為厥陰之氣頻擾於胃則水穀皆易釀為痰濁二者迭為賓主沖逆於上則眩暈耳鳴咳嘔絡脈阻痹等症皆至矣脈弦滑搏指且曾失血剛藥難投則取效不免難速蛤殼海石粉陳皮竹茹枳實白蒺藜茯苓荸薺白芍左牡蠣米仁海䖳湖州婦肝陽鬱勃動必犯胃久則胃氣大傷全失中和之用以致肝之鬱勃者聚而為疝胃之停蓄者聚而為飲疝動於下則飲溢於中所以居常胃氣不振時有厥氣攻逆自下而上懊憹痞滿必嘔吐酸綠之濁飲而後中通便溺漸行此所謂寒疝宿飲互為其病也病經數年宜緩以圖之若得怡神舒郁或可漸愈也茯苓三錢生冬朮一錢五分吳萸三分乾薑三分桂枝三分小川連三分枳實五分生薑三分白芍一錢五分炙甘草四分法半夏一錢竹茹一錢光接此乃苓桂術甘及溫膽湯戊已丸合成正如淮陰將兵多多益善又寒疝宿飲盤踞於中久而不和陽明大失中和之用今陽漸通降屢次所下黑黃干堅之矢既多且暢則腸腑之蓄積者得以漸去腸通然後胃和此真數年來病之大轉機也蓋飲疝互擾皆在陽明下流壅塞則上流何能受盛傳導盆滿必上溢此理之易明者也今宜專與養胃以充復其受盛傳導之職機不可失正在此時至於痔瘻溺少皆屬陽明為病可一貫也黨參三錢宋半夏一錢黑芝麻三錢麥冬一錢五分陳皮一錢五分火麻仁二錢刀豆子三錢杏仁二錢茯苓三錢白蒺藜二錢白粳米一合柿餅半枚又病纏三四年至今秋才得腸腑通潤燥結漸來繼以溏潤然後胃肺不至上逆嘔吐止而飲食進可見陽明之病以通為補也今秋深燥令痔必稍愈仍宜柔陽明以期漸漸充復潞黨參三錢陳皮一錢五分驢皮膠二錢棗仁二錢法半夏一錢茯苓二錢生甘草四分柿餅半枚金石斛三錢麥冬一錢五分秫米二錢荷葉一角光按此二則亦見於冷廬醫話中稱其首方效三易方全愈云云統觀三方用意不外通陽滌飲千里醫案卷五諸痛爽浦盧院痛先由繞臍而來去秋至今不暫寧息痛必在下舌鮮而光肺滑而數初由肝木之侮脾自及胃痛既久而藥劑過溫傷氣及絡絡傷便有動血之弊不僅痰氣凝滯已也宜柔劑急為辛溫和絡酒歸鬚二錢海石粉二錢九香蟲一錢陳皮一錢五分薏苡米三錢蛤殼四錢柏子仁三錢雲苓二錢旋覆花包一錢五分韭白三枚南潯李婦陽虛之體素多痰濕加以操勞悲鬱肝風失調乘陽明挾化風以致脘痛徹背旁及胸脅䐜脹痞噯作止不常然肢面浮脘腹腫是飲溢於外也耳鳴痙搐心懸如飢得食稍緩是風動於中也凡肝升太過必致胃降不及所以大便艱澀而脘痛數月不已也今脈右虛滯左弦數舌苔白膩近燥宜急急通陽滌飲泄肝和胃西洋參一錢五分雲茯苓二錢旋覆花一錢五分火麻仁二錢法半夏一錢五分陳皮一錢五分蘇子一錢五分竹茹七分生薑一片同搗炒枳實五分炙甘草四分蛤殼三錢桑葉兩張光按此證瓜蔞薤白亦可選用荻江吳婦腰脊痛自下及於中椎甚則轉側不便肢體漸惰舌黃口燥胃鈍心悸頭眩耳鳴火升汗泄患經半年餘脈象濡弦右關沉滑此屬肝鬱氣滯挾痰阻絡由少陽漸及太陽陽明絡病宜通膩補益滯矣旋覆花一錢五分米仁三錢木防已一錢五分石決明三錢歸鬚一錢五分白蒺藜二錢茯苓二錢絲瓜絡三錢白芥子三錢陳皮一錢五分蛤殼三錢荻江倪胸背絡痛由夏秋外感發熱而來則為痰氣阻絡明矣至今然後咳逆是痰氣鬱極而欲達也然氣痹久則津燥津燥則痰凝痰凝則絡益痛舌白口乾脈沉全屬氣機壅塞矣西洋參一錢五分旋覆花一錢五分苡米三錢海石粉二錢小川連三分瓜蔞皮二錢蘇子一錢五分竹茹七分杏仁二錢橘紅一錢五分枳殼八分廬根八寸錢家潭厲當臍時痛耎而喜按食難用飽大便燥結得噯與矢氣則快然痛起上春前年屢經下血而音窒不揚喉粗氣促脈右虛左弦肺胃大腸津氣大虛加以木來乘之宜用柔藥通和不可沾沾治痛西洋參一錢五分大麥冬一錢五分白芍一錢五分火麻仁三錢柏子仁二錢蘇子一錢五分大棗兩枚炙甘草五分白蒺藜二錢荔枝兩枚光按此症乃虛中夾實用藥尚稱的當王涇江陳婦脘腹痞滿不能納食食與動輒痛甚拒按便溏脈沉鬱而虛澀投以宣氣通痹宋見大效宜柔劑養肝和胃仿塞因塞用法西洋參一錢五分橘皮一錢五分大熟地三錢柏子仁二錢黑芝蕨二錢茯苓二錢紫石英三錢桃仁七粒白蒺藜二錢白芍一錢五分石決明三錢光按此症當溫運脾陽以通凝陰新市範婦氣滯痰凝肝膽脾胃失和久矣邇來脘腹膨痛寢食俱廢便結氣逆脘右癥瘕有形痛作則瘧止是氣擾於中也今痛雖止而脈猶滯舌白膩黃溺未清澈宜通調升降以和之法半夏一錢五分小川連三分蘇子一錢五分白芍一錢五分陳皮一錢五分乾薑四分柴胡三分雲茯苓二錢枳殼一錢青皮一錢嘉興莫初因便堅下血血燥生風風陽內擾左脅痛連肩背數發不已蒸痰釀濁瀰漫清空堵塞隧絡是以有嘔逆痞滿頭重肢痹也脈沉鬱右甚舌心黃宜滋液息風清氣化痰法緩調久病不可以峻劑劫之歸鬚一錢五分海石粉二錢白芍一錢五分代赭石二錢米仁三錢胡麻仁二錢旋覆花一錢五分冬桑葉一錢五分蛤殼三錢制首烏二錢丹皮一錢五分另服指迷茯苓丸三錢酒下南潯汪少腹痛子後午前較甚三月不止加以咳嗽胃鈍舌黃少寐亦已月餘脈右沉小弦左弦大堅肝脾營虛氣鬱故腹痛宜以丸緩治肺胃陽虛飲聚故咳而寢食皆乖宜以湯液和之粉沙參一錢五分杏仁二錢宋半夏八分枳實五分炙甘草四分雲苓二錢陳皮一錢五分秫米二錢炒穀芽二錢生薑三分姜竹茹八分丸方大生地三兩川芎七錢小茴香一兩蒼朮米泔水浸一兩歸身一兩五錢吳萸三錢元胡索二兩白芍一兩五錢炙草四錢制香附一兩五錢又腹痛少減咳倦如故脈兩手皆弦而左尤甚右弦為飲左弦為肝之郁乘脾則環臍痛痛甚於暮是肝膽旺時也肝陽擾肺則咳逆氣急胃不和則疲倦少食也潞黨參三錢茯苓二錢炒冬朮一錢五分枳殼八分陳皮一錢五分蘇子一錢五分炙甘草四分蛤殼三錢法半夏一錢五分桔梗三分沉香片三分杭州董厥陰之氣橫逆既久陽明水穀不能輸化留釀痰濁益加阻遏善噯矢氣舌黃口苦左脅腹厥氣刺痛無已腸鳴便溏宜用輕劑理痰氣愈補愈壅矣仙半夏一錢五分陳皮一錢五分蘇子一錢五分小川連三分旋覆花一錢五分茯苓二錢蛤殼三錢刀豆殼三錢海石粉三錢川貝二錢竹茹八分便血附腸風痔血永泰姚痔血多年血液虛燥去秋鬱怒閃挫氣血交阻吐瘀後右肋氣滯如塊中挾痰也手指時赤而麻手厥陰虛火亦動也調氣和絡固不可少而病之主尤須以止痔血為先血液充則痰亦不致易滯黨參二錢旋覆花一錢五分炒荊芥一錢五分烏梅一枚陳皮一錢五分薏苡仁三錢地榆炭二線阿膠二錢雲苓二錢白蒺藜二錢炒槐米一錢五分柿餅煨半枚震澤嚴鼻血痔血肺胃大腸虛燥之也數年來雖有作止然血既時去氣必易滯眩量昏瞀疲軟氣乏便結心精不足陽道不旺此皆陽明之為病蓋陽明虛則水穀之精微不能灌輸諸藏且無以束筋骨而利機關也興利必先除弊以清肺胃大腸為先西洋參一錢五分石決明三錢知母一錢五分霜桑葉兩張麥門冬一錢五分穭豆衣三錢槐米一錢五分柿餅半枚小生地三錢炒丹皮一錢五分黑芝麻三錢石門陳起初便堅後下血痔墜原是陽明大腸金燥為病此痔血也遷延至三年餘竟無虛日去血過度多陰絡大傷血無統攝有似漏卮肝脾腎三陰俱已枯燥所謂上燥在氣下燥在血氣竭則肝傷血竭則胃涸水穀所入不能敷布粗者凝滯於上釀為痰濁精者滲泄於下迸迫大腸其心悸氣逆近更咳逆是痰將為喘也其便溏日四五度每圊必失血數升脈右芤弦左寸關牢急面黃唇燥舌白如腐是津液氣血皆已告匱矣然痔血腸風究屬陽明本病此時惟宜急急存養津氣以養胃化痰斂澀陰絡以安營止血西洋參一錢五分橘皮一錢五分驢皮膠二錢大生地三錢糯稻根鬚三錢川貝母二錢麥冬一錢五分椿根白皮三錢炙甘草四分甜杏仁二錢白芍一錢五分炒黑地榆二錢蓮房三錢蔣褸吳多痰多濕之體濕熱下迫大腸痔血五年腸枯血燥大便艱澀異常腸既傳導失職胃之受盛益滯水穀精微半釀痰濁以致中脘結塊有形凡中樞不連則周身脈絡氣機皆阻雖吐痰不少而氣逆足軟心蕩腸鳴神疲等症皆作矣今舌苔黃膩脈右滑數欲和胃化痰必先潤腸養血取效雖難耐心調之可也西洋參一錢五分蛤殼三錢旋覆花包一錢五分製半夏一錢茯苓二錢杏仁二錢米仁三錢火麻仁二錢麥冬一錢蘇子一錢五分柿餅半枚晚另服清氣痰丸三錢又腸枯血燥胃滯痰凝以致陽明絡脈皆為阻遏今左膝腫痛肩項肘背皆痹急宣潤燥化痰通絡宣痹雖難速效尚不致廢歸鬚一錢五分米仁三錢木防已二錢煨石羔三錢竹瀝一茶匙薑汁和川牛膝二錢防風八分片薑黃五分鮮生地三錢稀薟草二錢荊芥炒一錢五分王涇江王素體肝陰不足易郁多火所謂木火之質故平日喜進甘涼九秋便溏遽用薑辣燒酒矯枉過正大反其常則大腸既受其燥劫厥陰又助其鬱火以致腸血雜下血色紫黯糞色蒼黃腹中氣聚攻逆亙塞噯與矢氣中仍不快稍有鬱怒則寢食皆乖左眥倏紅唇燥口乾此皆腸血去多風燥火熾之象也凡腸風為病前賢皆主燥論況又挾肝經鬱火而發於秋冬之交其為大腸燥金之病明矣不待論及便乾唇口燥而可決也且本火偏旺之質陽明腸胃津液易被消爍今病幾五旬腸不潤則胃亦虛自然痰飲上溢故口燥而惡湯飲飲反喜溫也此屬久病之兼症又當分別觀之今脈得右虛小而靜左三部皆小弦見數急當養陽明以止血為要血止則肝得養而不致橫逆胃不逆而漸就通和庶乎不至糾纏米炒洋參二錢陳皮一錢五分茯苓二錢川貝母二錢玟瑰花兩朵驢皮膠二錢白芍一錢五分荊芥炒三錢椿根白皮炒三錢粉丹皮一錢五分炙草四分白蒺藜二錢柿餅半枚杭州許煩勞飢飽陽氣久虛便血百日營陰又耗以致肝陽挾沖氣上逆手指冷懊憹嘔吐或竟暈厥今診得脈弦關尺欠柔議通陽平逆為主酸甘化陰為佐潞黨參二錢陳皮一錢五分旋覆花一錢五分蘇子一錢五分生冬朮一錢五分茯苓二錢白芍一錢五分沉香三分炙甘草四分桂枝三分小川連三分癇厥海鹽吳驚氣通於肝肝熱則膽寒而胃不和痰涎沃膽風木內震以致心悸頭眩耳鳴心神不能自主甚或運僕搐搦此皆內風與痰涎搏擊之故也脈象弦小滑宜溫膽以熄風和胃以滌濁病經多年恐難全愈製半夏一錢五分炒枳實五分粉丹皮一錢五分新會皮一錢五分天竺黃二錢石菖蒲三分炙甘草四分霜桑葉三片穭豆衣三錢雲茯苓二錢竹茹七分塘西勞婦去冬猝發癇症迄今月必數發發在夜昏痙口角血沫必吐痰涎而後醒居平經事不調頭運耳鳴心悸食少脈右芤弦近數此屬肝鬱生風膽虛聚涎猝犯胞絡神明遽蒙宜戒尤郁恚惱緩為圖治製半夏一錢陳皮一錢五分炙甘草四分大生地三錢竹茹七分天竺黃二錢茯苓三錢西洋參二錢穭豆衣三錢桑葉一錢五分石菖蒲三分枳實五分酸棗仁二錢胡麻仁二錢光按此症當治在血分又肝鬱生風膽寒聚液夜寐每發癇狀痰涎潮流昏不知人甚或失溲平時脈虛而靜頭痛脊痠耳鳴心悸經事不調前投熄風化痰宋見大效擬養血液以治其本大生地四錢歸身二錢元參一錢五分石菖蒲四分隨皮膠二錢白芍一錢五分白薇一錢五分棗仁二錢穭豆衣三錢丹參二錢池菊一錢五分桑葉一錢五分宮衖口宋前年夏怒氣傷肝肝膽風木挾痰火內擾致發癇症迄今二年餘其神呆善怒默處寡言多吐乾嘔等症雖皆滅而未淨盡近月來神思困倦飲食少進大異常時脈遲弱虛澀惟右寸獨大舌苔滑白邊白胖中心黑膩微寒而熱乾咳耳鳴心虛少寐手臂動即振掉此又有風燥之火上刑肺金中劫腸胃宜暫進滋肺養胃泄風化燥方法以化客感西洋參一錢五分陳皮一錢五分杏仁二錢丹皮一錢五分製半夏一錢五分茯苓三錢川貝二錢枳實五分池菊一錢五分天竺黃二錢桑葉一錢五分竹葉七張善連孫素有痰火風發癇厥居平眩悸耳鳴消渴便難肺胃津氣既虛則痰濕愈益凝聚今濕令氣蒸胸次欠舒知飢不運足痠脈滑乾咳音澀宜滋養肺胃津氣以化痰濕西洋參二錢杏仁二錢驢皮膠二錢赤茯苓三錢川貝母二錢橘紅一錢五分煨石羔三錢霜桑葉兩片火麻仁二錢米仁三錢天竺黃二錢瘧疾雙林馮先覺寒熱模糊嘔吐殊甚繼則瘧伏分明先參差後間日總計已旬有餘日昨瘧來寒戰而熱甚竟日始平汗多消渴額脹胸悶脅痞煩冤疲憊大便越數日一更衣堅硬色黑小溲赤熱而不多舌質紅而苔凝白脈濡長而數此屬暑熱之邪由少陽直迫陽明陰痹三焦幸得戰汗暢達雖痞悶煩冤而不致十分糾纏宜辛涼清解陽明可望漸愈也西洋參一錢五分知母一錢五分半夏一錢五分竹葉十醜片橘皮一錢五分煨石羔一錢五分白蔻仁五分荷花露一匙分二次沖赤苓三錢杏仁二錢益元散包三錢嘉興宋中年以後不免勞鬱則形氣易虛今秋因感作瘧所感者濕故胃易鈍氣易滯舌黃脈濡陽事不充皆陽明濕困宜先和陽明以祛弊後商培補以復元潞黨參二錢陳皮一錢五分澤瀉一錢五分蓮心十粒大有耆一錢五分茯苓一錢五分黃柏一錢五分鮮佛手一錢五分廣藿香一錢五分米仁三錢歸安吳伯塤上年秋季發疲瘧糾纏至今雖去年間有參差然內蘊之濕迄不能解甚至腫滿且發瘡痍蓋陽虛之體陽益虛則濕熱益不能化況瘧為經邪留連而暑濕之瘧又屬陽明多而少陽少陽明屬腑每多經邪傳腑內阻氣化外遏肌肉隧絡浸淫漫衍無處不到為腫為脹皆勢力之必至也今脈得虛澀似弦舌質光紅不但陽為濕困兼之津液亦漸消耗急須存津液和氣以為自強之本佐以開太陽闔陽明以止瘧消腫必得病魔漸退不致拖延到長夏濕土之時方可免陳陳困積之弊潞黨參二錢生冬朮一錢五分茯苓二錢桂枝三分絲瓜絡三錢炙甘草四分蜜炙石羔二錢五分五味子十粒乾薑一分同搗生薑皮三分製半夏一錢五分麥門冬一錢五分豬苓一錢五分澤瀉一錢五分烏鎮周念九日竟得寒戰而熱則暑邪已有外達之機蓋戰則邪與正相持而可畢達況間日又作瘧狀則暑當無不達矣其熱甚時之昏沉譫語是暑中夾濕之濁邪礙清也暑欲去則濕亦不能獨留而其濕流連於腸胃之間者既久且未免夾食夾痧所以腸腑之氣奔迫而下夾溏夾痰夾血或多或少腹痛滯下且有乾黑之宿垢亦漸錯雜而來則濕亦有下泄之機矣暑濕之為瘧為痢皆三焦主病脈得左遲濡右較大而見流利舌黃燥紇而不渴胸脘寬舒而納食無味甚少頻轉矢氣論舌與脈則大腸猶有宿垢留滯宜疏腑化滯專與理氣俾宿垢去而氣化調則胃當漸醒杏仁二錢黃芩一錢五分建面一錢五分益元散包三錢陳皮一錢五分枳殼七分鮮石斛三錢茯苓二錢銀花三錢鮮佛手一錢五分又昨日仍有瘧狀神氣尚為清淨大便連下黑溏數次甚多後雖似痢非痢而腹痛從重亦微稍能納粥脈得濡而微弦非必瘧邪在少陽之弦非必乘土之弦不過澀滯去而漸有流利之機也然舌心苔猶老黃且厚口渴溺少上噯下轉矢氣顯屬腸腑宿滯與濕濁尚未淨盡阻其氣機故耳疏滯化濕是為要圖建面一錢五分茯苓二錢金石斛三錢鮮藿香葉三張枳殼八分澤瀉一錢五分炒穀芽三錢佛手片一錢五分陳皮一錢五分山梔一錢五分益元散包三錢荷梗八寸三診感症初平遽爾啖飲衣單且思出房未免欲速太甚當此大氣升泄濕熱蒸騰之際即強壯無病亦須加意調護以防客氣之侵況體虛病後乎五六日來忽寒忽熱熱時煩冤嘔惡消渴喜涼兩額筋掣耳鳴面赤汗出涔涔甚至神昏錯語熱退則肢冷引衣自覆此皆濕熱之邪鬱蒸未化阻遏氣腑充斥三焦故唇燥齒乾舌苔或干或潤而黃苔究未肯退噯悶䐜脹寢食俱廢脈得弦大而數分觀之似乎肝膽腸胃者病且似虛實混淆其實三焦濕熱為病如是耳虛弱之體平時極宜小心既病不可躁急則病不易受而重者輕矣西洋參一錢五分小川連三分通草八分橘皮一錢五分紛丹皮一錢五分石菖蒲三分赤苓三錢炒山梔一錢五分佩蘭葉七片鮮石斛三錢鬱金一錢五分蘆根八寸歸安徐初起寒熱不常而咳嗽較盛繼以間日瘧狀四作寒熱俱甚嘔逆汁多便溏或瀉咳痰濃而黃舌苔白膩粗厚脈象弦滑之中反似有力可見初起原是新涼引動伏飲因素體多痰聚飲蓄之既久則出之必多阻遏肺胃則寒熱交戰即所謂無痰不成瘧也今據脈象痰飲之留於中者尚多必須緩為清化毋任逗遛致生他變鈐羊角杏仁川貝母炒黃芩天竺黃橘紅西洋參枇杷葉姜炒山梔雲苓宋半夏痿躄雙洋伍初夏寒熱原屬濕熱為病濕阻氣絡則足腫濕釀痰濁則效嗽糾纏半年濕仍不化足痿肉削內熱神疲二便艱澀濕病延至秋深又兼燥氣劫津痿躄益深矣西洋參一錢五分麥冬一錢五分米仁三錢稀薟草二錢小生地三錢玉竹二錢木瓜一錢五分川柏片二錢黑芝麻三錢丹皮一錢五分首烏二錢忍冬藤四錢光按太少通絡之藥雙林劉陽虛積濕體肥多痰濕熱內釀則大筋軟短小筋弛長而痿躄矣其所由來非伊朝夕酒容便燥即是見端即須通養陽明腑絡並調脈濡右滑慎勿雜投熱補表散之劑木防己一錢五分桂枝三分苡木三錢製半夏一錢五分生石膏二錢橘皮一錢五分歸鬚一錢五分川牛膝二錢西洋參二錢茯苓三錢竹瀝半匙薑汁數點絲瓜絡三錢海鹽楊咳嗽半年餘冬至節一陽勃動卒然腹痛加以咽痛音啞足跗腫痛不能履地此即肺虛極而子來救母所謂肺熱痿躄肺小弦促數急須養肺陰為要驢皮膠二錢炙草四分知母一錢五分大生地三錢馬兜鈴一錢五分杏仁二錢米仁三錢川黃柏二錢牛蒡子二錢川貝二錢枇耙葉兩片去毛光按此即內經肺熱葉焦發為痿躄之謂亦即上損及腎之象用藥雖中已恐鞭長莫及矣吳樓於素體陽虛濕勝濕釀成痰易汗畏風又有腸痔可見陽虛者陰亦不足也今夏軟腳而腫滿而赤便澀濕當滲導使之下趨得溫之運得補之壅則濕反隨氣蒸騰而上脈症參看不但慮其成痿且慮其成腫急宜疏通陽明腑絡於朮一錢五分米仁三錢木防己一錢五分煨石羔一錢五分豬苓一錢五分桂枝三分大腹絨二錢絲瓜絡三錢澤瀉一錢五分陳皮一錢五分茯苓皮四錢光按此乃濕熱壅滯將成痿象與上痿症截然兩途比而觀之可益人智烏鎮李足腫而軟步履維艱兩手大指亦皆微痹溺澀而黃時有氣逆脈浮濡滑此陽明濕痰蒸熱氣絡皆弛而為痿躄也去夏會發今又三月矣急清陽明以化通之生冬朮一錢五分米仁三錢川黃柏一錢五分真茅朮七分木防已一錢五分澤瀉一錢五分川萆薢二錢稀薟草二錢煨石羔二錢秦艽一錢五分赤茯苓三錢絲瓜絡三錢嘉興汪先覺左足中指斜外側之筋痠疼馴致兩足皆痿軃曳不良於行者已兩年除脈沉遲便難舌微白此濕熱鬱於肺胃而成痿躄也肺病則治節不行故痰多而不耐右臥胃病則大筋軟短小筋弛長日久病深難望全愈若得扶杖徐行庶可逍遙晚歲矣西洋參米仁木防己煨石羔驢皮膠歸鬚稀薟草川黃柏川牛膝木瓜知母光按此乃筋痿已成痼疾只許帶病延年若窮治之而用峻利之藥必致傷生吾見實多痹大河施謙山痹痛起於長夏愈而復作今又月餘初起手足關節等痛而且腫此固痹也濕甚於風則兼腫前賢謂風寒濕三氣臺而為痹又有行著痛三痹之別可知痹症中必當細辨也今諸處皆愈惟左膝猶腫攣而難伸膕外側之筋時或掣痛聞木聲亦痛此痹在陽明而兼少陽也舌黃不渴胃鈍少納易汗脈濡澀濕盛於風顯然矣宜專治陽明以通絡化濕兼治少陽以養絡熄風冀其速效不致糾纏成疾潞黨參川牛膝威靈仙酒炒歸鬚生冬朮木防己秦艽川黃柏苡米稀薟草木瓜丹皮忍冬藤桑寄生光按此等證近世多謂之風雜用白花蛇蜈蚣等毒藥益以燒針致陰津劫盡反成痼疾者比比皆是塘棲伊先腰脊痛兩腿惻廉後復聚於右肩胛及右臂外側上行部位皆在陽經且遊行上下者為風痛有作止而閃挫震動輒甚者為痰痰阻乎陽明少陽之絡宜通絡化痰為主毋事多歧病經半年雜藥亂投雖有中竅之方恐難速效耳羚羊角一錢五分丹皮一錢五分鉤藤三錢片薑黃五分當歸鬚二錢橘紅一錢五分枳實五分天竺黃二錢米仁三錢桔梗三分桑葉一錢五分忍冬藤五錢指迷茯苓丸每服五錢早晚二次陳酒送下光按此方用羚羊丹皮以清少陽佐鉤藤桑葉以祛風枳實竹黃橘紅米仁以通絡蠲痰引以薑黃忍冬桔梗復以茯苓丸以化肩臂之痰面面俱到新市高煩勞傷陽陽虛氣痹升降不和脈絡滯痛痛自左肩下至右腰及尻且作止不常嘔逆頭疼舌黃便結是病在氣絡矣和陽平肝通絡化痰未可專用太陽之藥茯苓米仁川連姜竹茹桂枝旋覆花陳皮絲瓜絡生冬朮歸鬚獨活晨服清氣化痰丸三錢鹽湯下新塍卜濕熱之邪混雜三陽迄今旬日雖壯熱神昏身痛等症俱退而邪勢留經入腑膀胱氣痹少腹高突拒按小溲淋瀝大便閉結所謂邪犯太陽之本已成胞痹矣脈來弦滑宜急急宣通少腑以防濕濁陰邪上逆喘脫豬苓一錢五分生冬朮一錢五分澤瀉一錢五分木防己一錢五分茯苓一錢五分小川連三分桂枝三分飛滑石三錢木通一錢車前子二錢光接此五苓加味若勢急可先用蔥白熨法及墨臍法頗獲捷效又大小便雖俱通然宿矢未盡胞痹未平舌黃脈右弦實仍宜通利猶在險途照前方去木通滑石車前加煨大黃二錢枳殼八分桃仁十粒薤白一錢嘉興陸婦在脘右膝痛腫甚於他處痛屬風腫屬濕屬熱未可執定前賢風寒濕三至成痹論治也體肥必多濕必畏熱當此濕熱鬱蒸之時稍感風邪則痹痛作矣迄今兩旬投羌桂輒作咽痛而胃鈍便溏身動則痛劇馴致頭痛肢體發熱口乾舌燥有裂紋苔黃氣蟲驚惕少寐兼有錯語自覺神思不清脈右滑大而數左弦數其為陽明熱痹痹在脈絡不在筋骨明矣痹既在絡脈則軀殼之病雖重無礙今熱的陽明內偪心胃則高年豈可輕視右滑大顯屬濕釀成痰胃熱及肺急宜滋肺胃養心營以化熱化痰為要因症施治不致痰熱內蒙則吉西洋參二錢鮮生地三錢米仁三錢霜桑葉兩片木防己一錢五分羚羊角一錢五分丹皮一錢五分蘆根一尺煨石羔二錢天竺黃二錢川貝一錢五分光按先賢論痹多謂風寒濕三氣雜合但近世所見者多風濕熱良以初手多用羌獨桂枝益以燒針即有寒邪亦已化熱湖州汪左臂痛止後右手脘及左足腫痛此名流火乃濕熱阻遏陽明之絡非傷科病也濕熱阻腑所以舌黃便乾胃鈍今脈弦數急宜疏腑以化濕熱歸鬚二錢木防己一錢五分赤苓四錢片薑黃五分米仁二錢小川連三分丹皮一錢五分稀薟草五分絲瓜絡三錢牛膝二錢煨石羔三錢五加皮二錢忍冬藤四錢咽喉論裘哲文病案頃奉來教所述咽痛而腫飲食皆妨燥咳或嘔聲啞痰黏的是外感時行之邪郁遏太陰上焦不得宣化計必有蒸熱惡風煩躁發斑之類書中言之未詳弟遵諭擬上一方乞即進服並再與省中精於時感者熟商之此時病狀斷非吾兄舊恙所致幸勿牽纏同論必得喉之痛腫全退而後諸症隨解也今春來杭嘉湖蘇松數郡此症偏多的系時邪俗名為喉風癍疹務須輕劑宣透清陽苦辛涼散溫燥膩補皆在禁例務祈審慎吳家兜張胃氣稍醒聲音略爽脈左部弦數右部尺同而寸關皆見虛弱前方通補脾胃腎服之頗投絕無飽脹膩鬲之弊惟藥飲到咽輒覺刺痛且咽痛左右不同而隆冬不喜暖帽臥喜著左涎沫時溢寐則口涎自流身凝熱口燥便難似乎津液之虛燥火之炎不獨陽明且多太陰症矣合觀脈象則竟屬秋燥之氣劫為多肺熱痿躄固亦足慮也議清燥救肺為主養胃存津為佐再圖緩效西洋參一錢五分蜜炙石膏二錢五分驢皮膠二錢川貝母二錢枇杷葉兩片火麻仁一錢五分蜜炙黃耆二錢大熟地三錢炙甘草五分麥冬一錢五分杏仁二錢淡秋石二錢桑葉兩片雙林王喉癬初發時原屬太陰肺金氣燥津傷遷延半年肺既虛耗子必救母未免少陰之火上炎矣痰涎湧溢食物梗澀吐納大堅餉這先絕脈弦而數勢頗可尤惟宜返視內聽屏除一切再以靜藥滋養金水希冀獲效大生地三錢阿膠二錢小川連三分炙甘草四分西洋參一錢五分天冬一錢五分淡秋石二錢雞子黃沖二錢大麥冬一錢五分紫苑一錢五分川貝母二錢長興周喉癬紫筋牽絡蒂丁赤痿食後少腹脹廚後溺孔有精莖中掣痛腎臟風脈搏數陰液不足肝腎虛火遊行上下有失血溺血之慮尚敢以火濟火急急加數月靜養功夫以涵養之元參一錢五分小生地三錢川黃柏炒一錢五分知母一錢五分澤瀉一錢五分淡秋石二錢龜板二錢丹皮一錢五分女貞子三錢甘草梢六分神墩僧先喉中介介繼以咳嗽音啞而痛痰來日以碗許近更吐血喉間臭氣嘖溢迄今年餘脈浮大數右手為甚此內喉癰也病不在咽故納食無大礙然高年肺氣大耗豈能無慮鮮生地三錢紫苑一錢五分炙草四分枇杷葉兩片驢皮膠三錢元參一錢五分牛蒡二錢茅草根二錢馬兜鈴一錢五分川貝二錢杏仁二錢光按喉科之症吹藥第一湯藥次之癰瘍烏鎮潘初起惡寒咳引左脅痛痰蒲原是寒鬱肺衛氣絡阻痹即是傷風重症葦莖湯等可解也奈邪郁不解而為肺癱吐膿至今已經月餘猶然氣穢色濁周身汁泄陣嗽或嘔胃納頗少脈象虛小而弦凡肺癰咳吐膿血每症如是猶不足怪所慮者久不得寢汗多食少耳此時以咳嗽爽利為要且須汗斂食增庶乎無慮西洋參一錢五分米仁三錢茯苓三錢甘草節五分橘紅一錢五分冬瓜子三錢鮮生地四錢茜草根一錢杏仁二錢川貝二錢百合三錢葶藶四分烏鎮鄭肝胃鬱火上擾左上齦齒痛數月不止致成牙癰潰逾兩旬腫痛雖減膿從鼻齶來尚未盡甚至頓車不舒脈弦且勁咽梗便燥急當息慮戒怒以靜養肝胃法調之大生地三錢白芍一錢五分麥冬一錢五分骨碎補三錢桑葉一錢五分石決明三錢丹皮一錢五分池菊一錢五分忍冬藤四錢西洋參二錢阿膠二錢胡麻二錢青鹽三分泗安許素來體肥多痰上年春夏痰出遽少此非生痰之源遽清乃氣化之郁也鬱極則生火所以季秋先覺咽痛左耳前後痛繼見上齶腫後且左頸頦亦腫此必鬱怒勞心之故故少陰心手少陽足厥陰肝膽之火勃動於中上炎清空則內郁之痰亦因火之勢上壅絡脈而致內外皆腫至於此極也迄今已閱四月然正其名則咽齶之腫是上齶癰也蔓延於外左側頸頜之腫上至額顱右及願頰堅硬不痛是馬刀俠纓也病之源雖一而症之象有二此姑不俱論但近來吞吐日艱飲食日少腫勢日盛精氣日削投治之要首重餉道議補議清皆屬迂圖然脈得小弦數而沉滑夫小為氣虛氣虛則痰益難化數為血虛血虛則火益難清況弦為木火沉滑為痰伏在裡故上齶色紅舌根腫強舌苔滑白清涎黏膩咯之欠利便結溺赤都屬無形之火與有形之痰膠固煎灼加城狐社鼠之盤踞矣症情既已如此而斡旋之法自必擇其要且急者而先圖之其先則莫要於先通餉道欲吞吐得利則勢不出乎上齶之潰膿或膠固之痰火出外舍此二者轉機雖有恐緩不及時耳謹擬煎散並進法庶幾治痰不偏乎燥峻清火不致乎膩滯然恐輊材不能勝此觀鉅潞黨參二錢陳皮一錢五分川貝母三錢天竺黃二錢犀角尖八分茯苓二錢驢皮膠二錢羚羊角一錢五分海石粉二錢蘇子一錢五分夏枯草二錢另海藻白礬二味等分斫細臨臥用白梅食鹽各少許泡湯乘熱調藥末二三錢送下澉浦陳初因痰氣凝聚腹右有塊隱見不常或微痛閱半年餘而竟潰膿似腹皮癰迄今又復半年末斂脈小弦近數總之不治痰氣因循至此耳小生地三錢歸身二錢茯苓三錢白芍一錢五分潞黨參三錢丹皮一錢五分米仁三錢絲瓜絡三錢白蒺藜二錢橘皮一錢五分蛤殼三錢長興朱肝脾腎三陰皆虧之體故居常有夢泄痰多左膺跳痛等症蓋虛則痰火易生近來頸癧串發咽乾蒂丁下垂脈濡弦數宜清理浮游之痰火以消頸癧為先小生地三錢元參一錢土貝母三錢丹皮三錢懷山藥二錢夏枯草一錢五分昆布一錢海藻一錢五分橘紅一錢五分徐家濱陳體疲無力久矣兩旬來咳嗽即繼右脅肋痛而浮腫氣逆不能轉側越數日必稠痰大出胸悶臂腫面浮不能納食大便五六日一更衣頗乾澀今又鼻衄脈濡此肺脾絡傷瘀阻飲聚防成內癰慎勿輕視米仁三錢川貝母二錢紫苑一錢五分甜葶藶四分桃仁七粒鮮生地三錢桔梗三分蘆根八寸橘紅一錢五分西洋參一錢五分枳殼八分絲瓜絡三錢光按先生亦精外科案中多經驗之談故並錄之以資參考
