body:
  text: 卷一中風嘉善楊向多痰火氣逆易咳晨圊痔必翻非揉撏不能收甚或痔血大來此足見肺胃大陽氣血虛久矣今卒然神思昏亂並無暈僕而右肢遽不能用舌蹇語澀便間句日才行干少溏多溲頻數而澀少且赤嗽痰頗濃息有音少寐易煩不昏瞀而間有錯語此屬老年氣血兩虛春夏之交不耐火氣升泄虛陽化風挾痰火勃動於中而外阻其絡脈內擾其神志也據現證是中絡兼腑初時右肢不用今漸能連動而肌膚痛癢無關是不仁也不仁為血虛偏右則氣亦虛矣但舌苔白滿而厚是氣燥津虛脈虛而弦兩寸較大是心肺兩虛而又有痰心主血肺主氣虛則火易上升而氣易下滯所以有數圊易怒多煩少寐等弊矣此時欲益氣而不滯痰養血而不膩膈庶乎虛責兼到據述愚見宗古人痰火內中者先治其內務使神明不為痰火所擾心君泰然則百體從令矣即或肢體不仁未能遽復不妨緩緩圖治況心主血脈心既清則血脈之流行自易西洋參一錢五分茯苓二錢蜜炙甘草四分川貝母去心二錢桑葉二錢炒山梔一錢五分法半夏一錢五分驢皮膠二錢竹葉二錢枳實五分橘皮一錢五分棗仁一錢五分蓮肉去心十粒右方約服五六劑若得寐漸長舌白稍薄喉間痰氣不致有音去枳實半夏加大生地四錢杏仁二錢大麻仁二錢若大便復閉慎勿遂與通利必俟其急迫屢圊不來不得已暫用搜風順氣丸又舌胎已退而舌質胖痰來輕薄氣息舒得大便暢行溏而老黃者數次今又七日不更衣溲漸利而色來清胃納稍和夜未酣睡痔外翻而腐續下痰物或中有痔膿夾雜亦未辨別統觀諸症大都痰漸化而火未熄陽明腸胃津液虛耗遽難充和所以寐少而便復閉不獨痔翻尤昭著也陽明外主肌肉內主津液津液虛則無以濯輸肌肉而束筋骨利機關之權亦弛而不張右肢之不仁蓋由於此不仁則不能用矣今欲求其不致成廢當先養陽明以存其津液胃和則寐安陽通則便調而痔收治內正所以治外也脈仍虛兩寸獨大大非心肺之有餘乃虛陽之上僭耳故耳鳴舌胖心煩易怒畢露其機緘時當大氣升泄宜柔靜通養為主久之若得步履稍可嚲曳便能扶杖逍遙矣西洋參一錢五分麥門冬一錢五分炒棗仁研二錢茯神二錢大生地四錢蜜炙大有耆一錢五分酒炒白芍一錢五分陳皮一錢五分驢皮膠二錢金石斛三錢甘草四分柿餅煨半枚又不仁為氣血不通先宜通養陽明前案論之詳矣今右肢漸知痛癢足見脈絡漸有流通之意但大便艱澀脈象沈滯耳鳴舌蹇神氣不振欲望陽明腸胃之充和以期氣通血潤尚遠然此症首重腸胃必須窮究其所以難通之故老年風閉前腎多責諸血液之虛想近年來痔血之去亦復不少血虛則風動欲腸胃之潤則養血正不可少今胃氣稍較醒似可參人濡潤養血之品矣潞黨參一錢五分麥門冬一錢五分杏仁三錢柏子仁三錢蘇子炒研一錢五分大生地四錢驢皮膠二錢川貝母二錢酒炒歸身二錢大麻仁又肢體熱癢而疼是血虛風燥所致絡脈如此腸胃益可知矣所以便難必越數日也高年中風大都為血液不充內風旋擾之故前賢有侯氏黑散以內填空竅以防風之復襲有地黃飲子以內養血掖以杜風之內生皆篤論也而便難一症尤為血虛的證所有風祕治法亦不一然又須因時制宜今未入秋而先形內燥將來何以御秋燥正令計從先為之圖川清燥救肺方綢繆未雨稍參和絡養胃法冀其府通然後格和西洋參二錢麥冬一錢五分火麻仁二錢大生地三錢蜜炙石膏一錢五分杏仁二錢炙草四分桑葉一錢五分驢皮膠二錢陳皮一錢五分米仁三錢枇杷葉兩片枇杷葉兩片光按前後四案議論殊佳扼重在血虛生風故一以養血息風為主湖州周婦向有偏頭風痛甚則或有眩嘔今煩勞傷陽陽虛風動旋擾清空絡脈弛懈陡覺右肢痛而左肢不用是風中在左也迄今五日嘔吐痰飲已止右額微腫而痛食少便結脈虛澀此腑絡兼中之症痰為虛痰風為內風宜清養陽明柔息厥陰冀其漸愈曾有便血當此燥令尤須遠剛用柔西洋參二錢陳皮一錢五分胡麻仁二錢鉤藤鉤二錢羚羊角一錢五分茯苓二錢杭茶菊二錢霜桑葉一錢五分驢皮膠二錢丹竺一錢五分穭豆衣三錢絲瓜絡三錢光按此方經清可法嘉興張七月下旬間瘧四作繼以泄痢此伏氣晚發未必清徹遽因孫受病殤勞憂悲傷動於中風寒迫於外遂感風燥作咳凡憂悲傷肺風燥亦傷肺以致痰雖出而風燥之火迄未化鬱極而升陡然舌蹇涎流官骸俱不能自主然現症多在身半以上而足仍能行知非風中腎厥是痰火內擾之類中矣況痰中亦有淺深內外虛實之別此痰火乃外感風燥之火之痰故舌蹇等症能暫退亦能復盛蓋痰出即人熄痰不出即火復熾所以越五六日而諸症復作也今身想有汗面紅齒燥舌蹇涎流右手指微強自言口燥之極脈得滑而右寸關尤甚顯屬肺感風燥未清痰火上擾脈絡之類中也宜滋肺氣存胃津以化痰為主痰出則火風自熄邪去則類中亦平西洋參一錢五分蜜炙石膏一錢五分橘紅一錢五分天竺黃二錢驢皮膠二錢杏仁二錢丹皮一錢五分霜桑葉一錢五分川貝母二錢羚羊角一錢五分甘草四分枇杷葉兩片光按議論透徹方亦妥貼易施唯於治痰一面尚少力量暑溫論宋可齊之嫂胎前感溫病案令嫂懷孕感邪據述病狀當是風輕濕重之溫今既化熱而舌苔焦黃胸脘痞悶其陽明尚少壅滯從三焦施者當從中上著手甘平宣肺少兼微辛微苦以疏降氣腑如燥渴引飲而便實者用芩梔杏橘甚或稍加黃連竹茹如舌膩便溏咳或兼嘔則用竹茹佩蘭甚或稍加枳殼蘇子精審詳察必期能化邪而不致傷胎斯為盡善苟有疑似寧輕劑緩化慎勿孟浪凡春夏之交大都溫必兼濕而春溫之氣又每因營虛之體乘間竊發故措手尤須慎重耳至於宣肺存津以及涼血安營等法諒能詳悉故不復贅只論疏中一法備採潞仲朱媼煩勞傷陽肺衛疏豁冬溫風燥之邪實於肺衛初起即見微寒而盛熱咳嗽錯語迄今旬日燥熱氣急呼吸有音痰濃而少嗽甚不爽頭痛雖罷耳嗚顴紅唇燥舌乾苔白有裂咳引胸脅隱痛脈寸關俱滑數而促此冬溫容肺之重症也八旬高年素有腸痔津液久虛今肺脾喘咳邪無出路最易劫津涸液痰膠氣喘益甚頭汗最防驟脫慎勿因小有鬱怒滯氣拋荒主病蓋雖小有食滯今已大便一次腹右有塊不過腸滯未盡肺與大腸表裡也潤肺即可通腸故此時以滋氣化痰急救肺以存津液為要著西洋參一錢五分橘紅一錢五分鮮生地四錢川貝母二錢米仁三錢杏仁二錢地骨皮一錢五分桑白皮二錢冬瓜子三錢炙草四分茅草根五錢枇杷葉三片光按唇燥舌乾苔白有裂此葉氏所謂氣熱爍津用藥恰好唯鮮生地當易鮮石斛茅根易蘆根更妙王涇江陳投清營宣氣存津透邪方藥脈象僅得濡緩弦虛不致模糊難以尋按濡緩為風為胃神虛則陽為濕遏弦為濕釀痰濁凡春夏之交感症風為春之餘氣濕為夏之王氣故現症每每如此其昏昏如醉蒸熱舌黃而灰溺赤便閉㿀疹隱隱現於肌腠欲達不達都屬濕溫二氣薰蒸郁遏似煙似霧清明之氣皆為矇蔽所謂肺氣窒痹不能宣化則周身之氣皆痹而化解不易耳今雖未有大效所幸安靜不致躁擾舌連齒板稍有潤澤之意若得一意拯治七八日工夫或有挽回之望犀角八分鮮生地三錢連喬一錢五分小川連三分天竺黃一錢石菖蒲三分炒山梔一錢五分丹皮一錢五分陳膽星三分橘紅一錢五分蘆根八寸竹葉十五片至賓丹一粒燈心湯熔化下先服光按舌灰而黃溺赤便閉可參用增液承氣大劑投之以冀萬一濮縣呂暑濕阻氣鬱而為熱汗出不解邪迫心包目赤耳襲神昏譫語幸得咳嗽疹出諸症漸退迄今兩月稍得安寐納穀惟氣火蒸騰乾咳未罷目皆赤脈象濡滯是暑退而濕未化宜甘平淡滲以清氣化濕若小心調養不致食復勞復則愈期亦不至遷延也西洋參一錢五分川貝母二錢鮮石斛三錢飛滑石三錢杏仁二錢天竺黃二錢米仁三錢竹葉十五片橘紅一錢五分炒山梔一錢五分通草八分蘆根八寸又感症後諸恙俱平惟舌苔猶膩耳目失清背易惡寒汗出即解此皆陽虛濕勝蒸鬱氣分尚須平劑清化西洋參一錢五分澤瀉一錢五分川石斛三錢半夏八分丹皮一錢五分茯苓二錢廣藿香一錢五分荷梗尺許橘皮一錢五分米仁三錢夏枯草一錢八分震澤孔痎瘧三年近漸作止不常大抵過勞輒發已是勞瘧景象瘧時溺數不禁是陰不內守煩渴引飲是津不上騰況兼痔漏復潰膿水淋漓氣液之消亡甚矣比復當春夏陽氣升泄之時陡然凝寒而熱渴嘔痞攻脅痛神煩此屬濕溫之氣乘虛襲入兼鬱於肺胃少陽氣絡阻痹遊行三焦也今熱退食進脈象弦數已平惟見虛弱濡消病勢似將退舍然口乾舌碎苔白神衰氣奪汗多食少寐不能安虛體感邪邪既未化而正已告疲深慮汁液過多津氣內奪虛脫驟見幸勿以小愈而忽之西洋參一錢五分甜杏仁二錢茯苓二錢蔗皮四錢黃耆皮一錢五分麥冬一錢五分川貝母二錢炙草四分金石斛三錢豬苓一錢五分炒穀芽三錢竹茹七分震澤陸寒熱咽痛吐瀉肢節腫痛紫斑隱見迄今七日昏沉如故稍有譫語齒燥耳聾舌黃地地揚手擲足喉間痰氣有聲便下一次甚少溲澀而胞痹身熱口渴脈弦數此風寒濕三氣難受經腑表裡皆痹挽救大難荊芥一錢九分牛蒡二錢五分石菖蒲二分厚朴八分小川連二分防風八分豬苓一錢五分絲瓜絡三錢連喬二錢蘆根八寸山梔一錢五分澤瀉一錢五分木防己一錢五分枳殼八分光按此症乃外感風濕引動伏邪已充斥表裡三焦荊防尚嫌太燥當用桑菊銀喬參入化濕之品如通草滑石等以辛涼解表為妙嘉興陳腫見於上頸領尤甚鼻易壅塞痰從上齶來肌膚漸見青紫似㿀非㿀病經兩月脈澀此風溫上受鬱於肺分與風水尚有小別宜輕揚之劑上者上治之法蜜炙麻黃三分炙甘草四分蟬蛻一錢西洋參一錢五分杏仁二錢鮮生地三錢荊芥一錢五分枇杷葉兩片煨石膏一錢五分廣橘紅一錢五分紫苑一錢五分光按肌膚青紫似癍非癍則邪不盡在氣分生地荊芥頗與此症相關善連楊前投清肺化邪清心安神方諸恙漸退胃納亦增復因煩勞傷陽風溫乘隙而入微寒而熱咳嗽又甚痰多色黃中夾粉紅氣急頭汗溺黃舌白脈濡數弦明屬復感所以諸恙皆來急宜清熱化邪毋使喘汗復盛西洋參二錢杏仁二錢牛蒡子一錢五分羚羊角一錢五分川貝母二錢丹皮一錢五分桑白皮一錢五分枇杷葉兩片天竹黃二錢茅根四錢地骨皮一錢五分又腸腑已通所下宿矢頗多腸通則胃和而肺亦降今寢食俱安熱退痰少耳聰目明舌邊紅苔薄白脈虛小和緩症情已臻安善矣而感症之後食復勞復最宜謹慎治法不宜驟補清養肺胃大腸以通為補俾寢食漸復其常即是不補之補西洋參二錢陳皮一錢五分鮮生地二錢米仁二錢金石斛二錢茯苓二錢丹皮一錢五分炙草四分川貝母二錢枇杷葉兩片
