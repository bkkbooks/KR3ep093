body:
  text: 卷二濕論姚伯昂學使病案奉到鈞諭祗悉種種初時便乾艱跗微腫莖皮微厚溺色黃赤馴至胃鈍欲嘔是濕熱之邪襲入手陽明大腸上擾足陽明胃也濕熱內蒸則微渴梨蔗汁稍多即作瀉濕家本易瀉但不可多瀉耳食入缺連是濕阻於中則胃氣不下行而反上逆所以頭亦為之眩脹也普洱茶溫中化滯與建曲同江浙閩廣初交濕令之神藥也凡遇胸腹痞滿頭目眩脹不論何病隨飲一二盞最妙南方卑濕地土浮薄溽淖一遇天氣陰晴蒸熱人易昏悶亦幾似瘴癘之病所謂痧脹也若覺神思不快或痞滿嘔瀉或頭脹肢麻即以平安散搐鼻或點眼角即解重則用冷水點服二三釐大可闢暑濕痧穢嵐瘴不正之氣今奉上一緘聊備左右不時之需以小瓶貯之勿使泄氣杭省精一堂合制者亦佳購之甚便也今跗腫未全退小溲尚未清長敬遵諭擬奉一方呈電蔗漿枇杷除煩養胃最佳梨桃黃瓜皆易滑泄鰻鱔壅滯均當忌也此體氣既小有違和飲食亦不宜強進且願稍稍節勞為祝方未見梅里張腸風下血經年至今冬才止陽明腑絡皆虛矣初夏寒熱發斑亦是風濕為病癍後風濕之邪似未清解風動厥陰則右側腰胯痛少腹攻脹濕阻少陰則右腿痹痛不能屈伸轉側風濕相合鬱蒸為熱則身熱惡寒汗多溺黃便反結閉舌白不渴胃鈍食少矣近復痰涎上壅咳咳不爽亦是濕濁所化脈虛而弦總之皆外邪風濕未清之故然風輕濕重尤宜通陽化濕為主必先退其鬱蒸之熱務使汗斂便調庶無虛脫之慮至於痹痛不妨緩圖生冬朮一錢五分枳殼一錢橘皮一錢五分絲瓜絡二錢滑石三錢米仁三錢石膏二錢蘆根尺許杏仁三錢防己一錢五分茯苓三錢又蒸熱漸止熱時仍有汗泄稍寐便亦稍潤右胯疝阻與右髀痹痛相連以致轉側屈伸不能皆適舌白口膩胃鈍溺少而黃脈又弦遲總之濕蒸熱鬱腑絡皆痹其痹之所以難通者中有疝氣橫膈升降之氣皆為所阻而厥陰既不調暢陽明益加壅塞矣疏厥陰以平疝氣通陽明以和腑格幸冀緩緩向安洋參一錢五分橘皮一錢五分米仁二錢石膏煨一錢五分稀簽草二錢麥冬一錢五分茯苓二錢防己一錢五分忍冬藤四錢絲瓜絡三錢威靈仙三錢川楝子兩枚青酒皮八分川牛膝二錢烏鎮楊陽虛濕勝之體兼之起居飲食不能慎攝或胸悶或便溏或夢泄面黃形瘦舌白脈滯反覆不常何以調理計惟常服丸劑緩以圖之若能謹慎自愛庶有康復之期資生丸鮮藿香葉下三錢湖州揚長夏右顴發瘍原屬陽明濕火上蒸不與降而與升則非但陽明腑氣不降而厥陰之濕火亦因之上升以致右足大趾痛氣逆由足及腹上至脘脅䐜脹皮膚是轟轟如蟲行減食消渴口苦舌黃脈弦而數顯屬胃不降而肝反升宜通宜降勿因高年遽投膩補究宜憑脈症以去病去病即所以顧正也病屬易治雖糾纏已久勿憂之鮮生地五錢雲苓二錢川楝子兩枚大腹皮二錢白蒺藜二錢小川連三分米仁三錢絲瓜格三錢丹皮一錢五分青皮八分澤瀉一錢五分佛手柑兩片光按案語去病即所以顧正卻是名言又肝陽挾濕循絡上行由足大指循腿入腹犯胃過鬲抵咽甚或頭面肩背都為氣焰所及肝經之循腹本有兩路一由中抵鬲一循陰器毛際旁連少腹兩胯也汗多少寐煩躁䐜脹舌黃口渴足冷皆由肝氣挾濕未能清化以致易升而難降也今脈之弦象稍有柔和之意數象已退大便漸有溏意而尚缺通暢此時總宜調肝化濕主通主降慎勿因寢食未和體氣倦怠遽投填補經月工夫當必漸臻安吉歸鬚一錢五分川楝子兩枚澤瀉一錢五分雲茯苓三錢米仁三錢小茴香一錢白蒺藜二錢絲風絡三錢川連三分青皮八分橘核一錢五分又疊投辛溫苦滲以通腑化滯非但諸症不退而大便反加燥結者良由時際秋深當王之燥氣必勝於長夏濕熱之餘氣以致肺胃大腸之結澀者益形虛燥燥則津氣皆澀而不行凡肺胃大陽之主乎通降者既不循職肝脾之主乎升者益升矣今脈得滑大弦搏舌邊黃燥而中心光口燥胃鈍脅腹脹痛宜滋養肺胃之津氣以通潤大腸為主腸通則胃和胃和則痰濕駁雜之氣皆可順流而降也西洋參一錢五分杏仁二錢橘皮一錢五分火麻仁二錢旋覆花一錢五分包蘇於一錢五分米仁二錢柏子仁三錢鮮石斛三錢白蒺藜二錢蛤殼三錢光按案語妙九里橋徐寒熱參差原屬秋深晚發迄今月餘餘熱蒸蒸汗多便溏溺黃脈小弦數胸腹白疹續發未巳此濕熱餘邪尚未盡化阻痹蒸郁腑陽既未通降則宿痞自然升逆疏腑通陽濕熱漸化則痞自漸和矣西洋參一錢五分杏仁三錢穭豆衣三錢澤瀉一錢五分廣陳皮一錢五分炒穀芽三錢丹皮一錢五分桑葉一錢五分雲茯苓三錢白蒺藜二錢左牡蠣三錢蘆根八寸光按簡潔老當方亦靈動杭州王平居嗜酒濕凝陽郁為病去秋四肢疼痹兩足及左臂為甚乃是濕蒸氣滯足太陰陽明脈絡不宣也繼則鼻衄難經所謂陽絡傷則血外溢陰絡傷則血內溢熱泄氣通自然絡痹較衰矣今春左乳結核時咳痰稠體疲脈濡舌黃目昏耳鈍亦濕邪上蒙耳然絡病宜清腑病宜通時值夏令收效難速擬用和陽化濕清氣宣絡緩圖之潞黨參二錢法半夏一錢木防己一錢五分赤豆衣三錢竹茹七分新會皮一錢五分生冬朮一錢川黃柏一錢五分粉丹皮一錢五分雲苓二錢炙甘草四錢米仁三錢建澤瀉一錢五分洞庭山蔡陽虛嗜酒之體屢為濕困以致腰重不耐久坐左屑臂痛瘡痍時發不能盡泄經隧之濕由陽明深入厥陰為便難肛痔為囊風腿癬滋蔓無已皆濕病也脈濡澀不宜用剛藥燥劫議養陽明以清厥陰冀其緩效大生地歸身川斷米仁制首鳥丹皮杜仲稀蘞草生冬朮萆薢黃柏忍冬藤另服指迷茯苓丸三錢酒下光按此症生地首烏太覺膩滯可加銀花絲瓜絡桑葉等以靖厥陰之濕熱比麻李身熱已退七人大便逐日一度干而尚順耳聰神清食進溺淡黃舌薄白脈濡滑緩論症情喜已退舍此時宜清養陽明冀其腸胃通和則未盡之濕熱便可漸次清化矣西洋參一錢五分陳皮一錢五分米仁三錢竹葉念片煨石羔三錢赤苓四錢通草七分蘆根八寸益元散三錢知母一錢五分杏仁二錢光按南方地形卑下入夏以來雨水較多泛潮更甚故濕病最多往往胸痞納呆頭額脹悶身熱凜寒甚或壯熱汗多發為白㾦治不得法動輒經月更有延誤傷生者此證最忌辛溫發表苦寒冰伏要在清熱不助濕利濕不傷陰方為妙手火吳娑顧兩耳鳴次第失聰皆因外風內襲而來據述胸腹氣火上升為鼻淵齒衄胸痹痰多下迫為痔瘍便難或溏今脈得細弦遲全屬少陽陽明風火痰三者為病矣潞黨參陳皮枳殼穭豆衣法半夏茯苓胡麻炒杭菊麥門冬丹皮桑皮竹茹光按此症磁朱丸亦可選用杭州裘五內如焚起滅無定時易怒多疑舌膩口甜脈弦左尤甚肝熱由於膽寒脾疸由於胃滯所謂五志火動神明內擾也隆冬蟄藏之時宜用育陰潛陽法大熟地三錢阿膠一錢五分天冬一錢五分茯神二錢竹茹八分牡丹皮一錢五分牡蠣三錢佩蘭葉一錢蓮心十粒白芍二錢澤瀉一錢五分棗仁二錢黑芝麻三錢另服硃砂安神丸連心糊丸光按此方與症絲絲入蔻王涇江張女病閲六年初因氣滯飲聚久則絡逆火升兩月來才得平臥血止然飲沫上溢日必碗許咳嘔眩悸齒血牙疳頸癧面浮氣阻絡痹輒覺郁痛此皆由於氣火之郁偏寒偏熱非調郁法也緩圖尚可少安第難欲速耳西洋參一錢五分驢皮膠二錢金石斛三錢穭豆衣三錢茯苓二錢蛤殼三錢石決明三錢旱蓮草二錢川貝母二錢海石粉三錢光按此方清平穩妥頗足法則嘉善沈尤愁過度手足厥陰動而不靜以致疝聚於中火升於上精泄於下脘右痞脹妨食齦腫目昏額痛瞤慍痿耎等症紛擾數年不已甚至心神不能自王宜緩調手足厥陰以安心胃大熟地三錢白芍一錢五分穭豆衣三錢龍骨二錢荔枝兩枚紫石英三錢棗仁二錢胡麻仁二錢池菊一錢五分金櫻子三錢牡蠣三錢建蓮子十紋芡實三錢光按柔育心肝似已周到唯於痞脹妨貪似未顧及緑萼梅砂仁亦可加入杭州裘服育陰潛陽藥以來春時竟不夢遺是可喜也然晨易心悸悸即易怒多疑懊憹此肝膽包絡尚有鬱熱凡鬱熱之沖原無定時而心胃獨當其沖所以目淚鼻血齒痛口乾舌黃便溺不能了了脈弦實相因而來也宜清肝之用養肝之體以調疏泄之職則膽與包絡皆和矣西洋參一錢五分白芍一錢五分陳海蜇二錢炒山梔一錢五分霜桑葉一錢五分大生地三錢丹皮一錢五分金石斛三錢白蒺藜二錢石決明三錢荸薺兩枚火麻仁二錢女貞子三錢臨臥仍用燈心湯下硃砂安神丸四五錢光按丹溪云上升之氣多自肝出此方平肝清肝一線穿成燥桐鄉曾八月初寒熱似瘧是新涼外迫伏暑內動之感證奈挾食挾怒而脘痛嘔逆吐蛔特甚客反勝主治法不免暄賓奪主矣腑病宜通得濡潤而痛減得溏泄而痛竟暫止感症之流連肺胃者每每如此糾纏一月病未了了寒熱又作頓加咳嗽面浮則又病中體虛復加一層秋燥之邪肺氣益痹以致腹痛作而齦齒乾燥也脘痛連及胸背動輒氣逆肺之膹鬱極矣耳鳴汗出劑頸而還則病邪傷陽也腹痛便瘀溺色似血病邪傷陰也體之陰陽雖皆受傷而秋燥之邪大隊尚聚在胸鬲之間脈右虛凝左小弦數顧正但須養胃存津化邪但宜宣肺化燥眼光但照大局未可偏執一隅枝枝節節為之矣至於病機之危何須再說西洋參一錢五分川貝母二錢茯苓二錢金石斛三錢麥冬一錢五分驢皮膠二錢丹皮一錢五分炙甘草四分杏仁二錢橘紅一錢五分紫苑一錢五分霜桑葉一錢五分光按此乃喻氏清燥救肺湯加減惟既有脘痛徹背則辛潤之品不可缺少九里匯陸向有跗腫或大小足指痛不能行每發必糾纏纍月近因心境動擾先覺腳痛繼以齒痛延及左半頭額顴頰甚至身熱左耳流膿迄今兩旬耳膿及額俱痛而徹夜不能成寐煩躁益增咽齶乾燥耳鳴口乾咯有凝血食少便難脈兩關見弦素體操勞尤郁由來久矣心脾營虛是其質近來復感風燥之火上爍肺金金不制木肝陽化風化火上擾清空肺胃津液皆為消爍是以現症種種虛實混淆宜先用甘涼濡潤以存津液以化虛燥鮮生地三錢知母一錢五分胡麻仁二錢夏枯草一錢五分茅根四錢驢皮膠二錢麥冬一錢五分杭黃菊二錢西洋參二錢桑葉一錢五分石決明三錢棗仁二錢川芎七分川貝母二錢又連服甘涼濡潤之劑以存胃津熄肝風咽齶之燥已減血亦漸止右額浮腫亦退大便雖澀而日行胃納亦安脈左靜小而虛右關稍有弦象以便尚少即寐亦未酣適鼻氣窒塞蓋燥為虛邪而言以素虛之體易受燥邪也其平素面跗龐然兩足易痛原屬陽明津虛絡脈久失濡潤故燥氣加臨愈覺沖逆今擬滋養肺胃充潤津液肺金清肅則肝木自平胃氣充和則夜寐自安矣至於節勞戒怒則在自愛者留意焉鮮生地二錢麥冬一錢五分西洋參一錢蛤殼三錢桑葉二錢驢皮膠二錢橘紅一錢五分廾皮一錢五分枇杷葉兩片金石斛三錢川貝二錢胡麻仁二錢又脈六部緩小右關之滑形已退大匣稍潤漸能假寐然咽齶仍幹上及於鼻瘀聚氣穢呼吸不和兩耳抽掣心中時惕凡鼻息不得臥眠陽明病也顯屬風燥之火上傷天氣清竅窒塞津液不能上承疊投甘涼濡潤而迄今不能大效計惟有仿古人風以潤之之義取其清陽上達可至病所則存津滋液庶乎有裨西洋參二錢元參一錢驢皮膠二錢夏枯草一錢五分薄荷一錢五分川貝母二錢甘草四分鮮生地三錢枇杷葉兩片茅根三錢犀角尖六分辛夷一錢牛蒡子二錢防風八分西窯頭陳婦經來色黑久矣漸致屆期少腹必痛脹似崩似淋而成紫黑且有塊兼之去年至今便血半年血分鬱熱之深可見血燥則臟燥故悲喜無端似有鬼神凡婦科血燥而鬱熱則心營之有虛火不待言矣心主易震則肝膽相火安得不動火焰於上則肺受克而津氣易釀痰濁痰與瘀血為心火所引則漸入手厥陰包絡故現症有如此之變幻龐雜也病之源流標本如此從此用意自有治法總而言之此藏燥夾痰症也鮮生地三錢白薇一錢五分五靈脂二錢川百合二錢淮小麥二錢紫草一錢黑芝麻二錢羚羊角一錢五分炙甘草四分驢皮膠二錢天竺黃二錢又進治臟燥血鬱方半月餘諸症皆退體中頗適近因經候之期先覺便難繼以內熱經來仍然紫黑自覺諸症皆動而忽悲忽笑不能自主此其故總由血分尚有鬱熱深伏於衝任血室之間屆期血動則鬱火亦動心主血主火君火動則五志之火一時焰發故現症種種幾乎無藏不動也乘其血動之時因勢而內奪之必得鬱火清則狂瀾不沸心君泰然矣犀角尖七分丹皮一錢五分酒製大黃三錢紫草一錢鮮生地三錢白芍一錢五分桃仁泥一錢五分光按案語老煉方亦簡潔又臟燥漸減秋冬之交竟有三月不大發然稍勞怒輒覺火升鼻乾心神不能自主而帶重腰痠左足易熱經來參差腹痛氣墜色仍紫黑此八脈鬱火尚未清化宜用靜劑專清奇經鮮生地三錢歸身一錢五分白芍一錢五分驢皮膠二錢丹皮一錢五分川貝母二錢蒲黃三分五靈脂二錢白薇一錢五分西洋參二錢光按此症與金匱之藏燥似是而非此乃血結成燥彼乃血虛藏燥故用藥亦不同武康錢肌表微寒而熱似瘧非瘧鼻乾有血胃鈍少納脈浮弦數陽部為甚此燥火上薄肺金自秋初至今迄不肯已瓜致便溏是肺與大腸兩金皆困老年豈是輕症況素有失血則氣血俱耗矣西洋參一錢五分麥冬一錢五分川百合四錢白粳米一撮川貝母三錢紫苑一錢五分驢皮膠二錢枇杷葉兩片款冬花一錢五分炙草四分光按燥為次寒復氣為熱故秋令漸涼則燥氣大行而其字則從火也古來治內燥首推魏玉橫之集靈膏治外燥允推喻西昌之清燥救肺湯
