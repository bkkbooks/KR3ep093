body:
  text: 張氏醫案跋憶昔髻齡就傳城南編吉巷施師補華孰中課讀間嘗聞之太夫子許雷門汪謝城兩先生言吾浙名醫以桐鄉張千里學博為最著惜詠生也晚不及瞻仰丰儀為憾事旋從曉五胞伯侍診十年耳提面命時亦曾以張先生勗勵後進爾時先嘉六府君就貴陽張公秀水縣刑席公餘之暇散步城中向有書癖在舊書攤上購得此稿閲之珍為拱璧藏諸行篋有年矣內有詳陳錫山孫文成公病腫議論停止草藥緣由將身體作提防洞徹病因分明譬解名言精義頗具至理不愧斫輪老手治病治河何莫不然令人企敬前型百讀不懨詠會筮仕山左隨督河主任豫懷張愚針都鄉上達於上中下三遊堵合張村大寨四紙坊韓家垣陶城埠格提高家套諸險工臺龍案內洊保二千石虛榮隨帶加一級於河工堤防堵合宜泄引河挂柳護掃諸要略有心得躬履其境似與醫病理由同一宗旨如壅淞者宜開浚疏利以導之若坍陷者宜培土夯硪以補之誠不刊之論萬古難移醫者意也昔人謂用藥如用兵亦即狎玩多死之意嗣於父執武林校官陸定圃先生冷廬雜識書中亦見有此論則斯稿為張先生手澤可無疑慮兼有吾湖歸姓方案為之質證今幸越中醫界諸同仁發起搜集各省先賢遺稿刊印流傳俾存一線曙先用作後學津粱免致湮沒勿彰亦保存國粹一端也爰録此稿郵呈以應裘君吉生函招籍副神交知已雅命且詠肉帛逾年精力日衰胡敢自祕公諸同好未始非活水靈源之一導也時庚申春後學吳興凌詠永言醫叟謹跋於滬濱尚素軒腐居
